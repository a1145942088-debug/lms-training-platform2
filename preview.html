<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课件预览 - C919系统CBT培训平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .preview-header {
      background: #16213e;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #0f3460;
    }
    .preview-title {
      color: #e94560;
      font-size: 18px;
      font-weight: 600;
    }
    .preview-info {
      color: #888;
      font-size: 14px;
    }
    .preview-actions {
      display: flex;
      gap: 12px;
    }
    .preview-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .preview-btn-close {
      background: #e94560;
      color: white;
    }
    .preview-btn-close:hover { background: #c73e54; }
    .preview-btn-fullscreen {
      background: #0f3460;
      color: white;
    }
    .preview-btn-fullscreen:hover { background: #1a4a7a; }
    .preview-content {
      flex: 1;
      position: relative;
      background: white;
    }
    .preview-iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .loading-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .loading-overlay.hidden { display: none; }
    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid #e0e0e0;
      border-top-color: #1a5fb4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      margin-top: 20px;
      color: #666;
      font-size: 16px;
    }
    .loading-progress {
      margin-top: 12px;
      color: #1a5fb4;
      font-size: 14px;
    }
    .error-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #fff3f3;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }
    .error-overlay.show { display: flex; }
    .error-icon { font-size: 64px; margin-bottom: 16px; }
    .error-title { color: #c53030; font-size: 20px; margin-bottom: 12px; }
    .error-message { color: #666; font-size: 14px; max-width: 500px; line-height: 1.6; }
    .error-details {
      margin-top: 20px;
      padding: 16px;
      background: #fed7d7;
      border-radius: 8px;
      font-size: 13px;
      color: #c53030;
      max-width: 500px;
      text-align: left;
    }
    .source-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      z-index: 5;
    }
    .source-badge.cloud {
      background: #d1fae5;
      color: #065f46;
    }
    .source-badge.local {
      background: #fef3c7;
      color: #92400e;
    }
  </style>
</head>
<body>
  <div class="preview-header">
    <div>
      <div class="preview-title" id="coursewareName">课件预览</div>
      <div class="preview-info" id="coursewareInfo"></div>
    </div>
    <div class="preview-actions">
      <button class="preview-btn preview-btn-fullscreen" onclick="toggleFullscreen()">
        ⛶ 全屏
      </button>
      <button class="preview-btn preview-btn-close" onclick="closeWindow()">
        ✕ 关闭
      </button>
    </div>
  </div>
  
  <div class="preview-content">
    <div class="source-badge local" id="sourceBadge">💾 本地模式</div>
    
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
      <div class="loading-text" id="loadingText">正在加载课件...</div>
      <div class="loading-progress" id="loadingProgress"></div>
    </div>
    
    <div class="error-overlay" id="errorOverlay">
      <div class="error-icon">⚠️</div>
      <div class="error-title" id="errorTitle">加载失败</div>
      <div class="error-message" id="errorMessage"></div>
      <div class="error-details" id="errorDetails"></div>
    </div>
    
    <iframe class="preview-iframe" id="previewIframe" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
  </div>

  <!-- JSZip库 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  
  <script>
    // 获取URL参数
    function getUrlParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }
    
    const coursewareId = getUrlParam('id');
    let courseName = decodeURIComponent(getUrlParam('name') || '课件预览');
    
    document.getElementById('coursewareName').textContent = courseName;
    
    function showLoading(text) {
      document.getElementById('loadingOverlay').classList.remove('hidden');
      document.getElementById('loadingText').textContent = text || '正在加载...';
      document.getElementById('errorOverlay').classList.remove('show');
    }
    
    function hideLoading() {
      document.getElementById('loadingOverlay').classList.add('hidden');
    }
    
    function showError(title, message, details) {
      hideLoading();
      document.getElementById('errorOverlay').classList.add('show');
      document.getElementById('errorTitle').textContent = title || '加载失败';
      document.getElementById('errorMessage').textContent = message || '';
      document.getElementById('errorDetails').textContent = details || '';
    }
    
    function updateProgress(text) {
      document.getElementById('loadingProgress').textContent = text || '';
    }
    
    function setSourceBadge(mode) {
      const badge = document.getElementById('sourceBadge');
      if (mode === 'cloud') {
        badge.className = 'source-badge cloud';
        badge.textContent = '☁️ 云端模式';
      } else {
        badge.className = 'source-badge local';
        badge.textContent = '💾 本地模式';
      }
    }
    
    async function loadCourseware() {
      if (!coursewareId) {
        showError('参数错误', '未指定课件ID', '请从课件管理页面点击预览按钮');
        return;
      }
      
      showLoading('正在读取课件数据...');
      
      try {
        // 从LocalStorage获取课件数据
        const coursewares = JSON.parse(localStorage.getItem('lms_coursewares') || '[]');
        const cw = coursewares.find(c => c.id === coursewareId);
        
        if (!cw) {
          showError('课件不存在', '请检查课件ID是否正确', '可能原因：课件已被删除或尚未上传');
          return;
        }
        
        courseName = cw.name;
        document.getElementById('coursewareName').textContent = cw.name;
        document.getElementById('coursewareInfo').textContent = 
          '📁 ' + (cw.fileName || '未知') + ' | 📝 ' + (cw.entryFile || 'index.html');
        
        // 优先使用云端URL
        if (cw.url) {
          setSourceBadge('cloud');
          await loadFromCloud(cw.url, cw.entryFile);
          return;
        }
        
        // 本地模式：使用Base64数据
        setSourceBadge('local');
        if (cw.zipData && cw.zipData.length > 100) {
          await extractAndPreview(cw.zipData, cw.entryFile || 'index.html');
        } else {
          showError('课件文件未存储', '无法加载预览数据', 
            '可能原因：\n1. 文件较大（>5MB），浏览器存储空间不足\n2. 上传时未完整保存\n\n建议：配置阿里云OSS云存储以支持大文件');
        }
      } catch (error) {
        console.error('Load error:', error);
        showError('加载失败', error.message, error.stack);
      }
    }
    
    // 从云端URL加载
    async function loadFromCloud(url, entryFile) {
      showLoading('正在从云端下载课件...');
      
      try {
        // 下载ZIP文件
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error('云端文件下载失败');
        }
        
        const arrayBuffer = await response.arrayBuffer();
        updateProgress('下载完成，正在解压...');
        
        // 转Base64
        const base64 = arrayBufferToBase64(arrayBuffer);
        await extractAndPreview(base64, entryFile || 'index.html');
      } catch (error) {
        console.error('Cloud load error:', error);
        showError('云端加载失败', error.message, 
          '可能原因：\n1. 文件不存在或已删除\n2. 网络连接问题\n3. CORS跨域限制');
      }
    }
    
    // 解压并预览
    async function extractAndPreview(zipBase64, entryFile) {
      showLoading('正在解压课件包...');
      updateProgress('准备解压文件...');
      
      try {
        // 解码base64
        updateProgress('解码ZIP数据...');
        const zipData = atob(zipBase64);
        const byteArray = new Uint8Array(zipData.length);
        for (let i = 0; i < zipData.length; i++) {
          byteArray[i] = zipData.charCodeAt(i);
        }
        
        // 解压
        updateProgress('正在解压...');
        const zip = await JSZip.loadAsync(byteArray);
        
        // 查找入口文件
        updateProgress('查找入口文件...');
        let entryPath = entryFile;
        
        if (!zip.file(entryPath)) {
          const indexFile = zip.file('index.html');
          if (indexFile) {
            entryPath = 'index.html';
          } else {
            const files = Object.keys(zip.files);
            const htmlFiles = files.filter(f => f.endsWith('.html') && !f.includes('/'));
            if (htmlFiles.length > 0) {
              entryPath = htmlFiles[0];
            }
          }
        }
        
        const entryZipFile = zip.file(entryPath);
        if (!entryZipFile) {
          showError('入口文件不存在', `找不到入口文件: ${entryPath}`, 
            '可用文件:\n' + Object.keys(zip.files).filter(f => f.endsWith('.html')).join('\n'));
          return;
        }
        
        // 提取所有文件
        updateProgress('提取文件资源...');
        const fileMap = {};
        const promises = [];
        
        zip.forEach((relativePath, file) => {
          if (!file.dir) {
            promises.push(
              file.async('base64').then(content => {
                const ext = relativePath.split('.').pop().toLowerCase();
                const mimeTypes = {
                  'html': 'text/html', 'htm': 'text/html',
                  'css': 'text/css', 'js': 'application/javascript',
                  'json': 'application/json',
                  'png': 'image/png', 'jpg': 'image/jpeg', 'jpeg': 'image/jpeg', 'gif': 'image/gif', 'svg': 'image/svg+xml',
                  'mp4': 'video/mp4', 'webm': 'video/webm',
                  'mp3': 'audio/mp3', 'wav': 'audio/wav',
                  'pdf': 'application/pdf',
                  'woff': 'font/woff', 'woff2': 'font/woff2', 'ttf': 'font/ttf', 'eot': 'application/vnd.ms-fontobject'
                };
                fileMap[relativePath] = {
                  content: content,
                  mimeType: mimeTypes[ext] || 'application/octet-stream'
                };
              })
            );
          }
        });
        
        await Promise.all(promises);
        
        // 创建Blob URL
        updateProgress('创建预览环境...');
        const entryContent = fileMap[entryPath].content;
        const entryMimeType = fileMap[entryPath].mimeType;
        
        // 替换内部链接
        let htmlContent = atob(entryContent);
        
        Object.keys(fileMap).forEach(path => {
          if (path !== entryPath) {
            const blob = base64ToBlob(fileMap[path].content, fileMap[path].mimeType);
            const blobUrl = URL.createObjectURL(blob);
            // 替换相对路径引用
            htmlContent = htmlContent.replace(new RegExp('["\'](\\.[^"\']*' + path.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '|[^"\']*' + path.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'g'), 
              '"' + blobUrl + '"');
          }
        });
        
        // 创建HTML Blob
        const finalBlob = new Blob([htmlContent], { type: entryMimeType });
        const blobUrl = URL.createObjectURL(finalBlob);
        
        const fileCount = Object.keys(fileMap).length;
        document.getElementById('coursewareInfo').textContent += ' | 📦 ' + fileCount + ' 个文件';
        
        hideLoading();
        document.getElementById('previewIframe').src = blobUrl;
        
      } catch (error) {
        console.error('Extract error:', error);
        showError('解压失败', error.message, 
          '可能原因:\n1. ZIP文件损坏\n2. 文件过大\n3. 不支持的压缩格式');
      }
    }
    
    function base64ToBlob(base64, mimeType) {
      const byteCharacters = atob(base64);
      const byteNumbers = new Array(byteCharacters.length);
      for (let i = 0; i < byteCharacters.length; i++) {
        byteNumbers[i] = byteCharacters.charCodeAt(i);
      }
      const byteArray = new Uint8Array(byteNumbers);
      return new Blob([byteArray], { type: mimeType });
    }
    
    function arrayBufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = '';
      const chunkSize = 8192;
      for (let offset = 0; offset < bytes.length; offset += chunkSize) {
        const chunk = bytes.subarray(offset, Math.min(offset + chunkSize, bytes.length));
        binary += String.fromCharCode.apply(null, chunk);
      }
      return btoa(binary);
    }
    
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }
    
    function closeWindow() {
      if (window.opener) {
        window.close();
      } else {
        window.history.back();
      }
    }
    
    window.addEventListener('load', loadCourseware);
  </script>
</body>
</html>
