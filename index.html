<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C919系统CBT培训平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #0d47a1 0%, #1565c0 50%, #1976d2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { text-align: center; padding: 40px; max-width: 900px; }
        .logo { font-size: 80px; margin-bottom: 20px; }
        h1 { color: #fff; font-size: 48px; margin-bottom: 8px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .subtitle { color: rgba(255,255,255,0.8); font-size: 20px; margin-bottom: 60px; }
        .cards { display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; }
        .card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 50px 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            min-width: 300px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 30px 80px rgba(0,0,0,0.3); }
        .card-icon { font-size: 72px; margin-bottom: 20px; }
        .card-title { color: #1565c0; font-size: 28px; font-weight: bold; margin-bottom: 12px; }
        .card-desc { color: #666; font-size: 15px; line-height: 1.6; }
        .footer { margin-top: 60px; color: rgba(255,255,255,0.6); font-size: 14px; }
        
        /* 底部信息 */
        .info-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        .info-item { color: rgba(255,255,255,0.8); font-size: 14px; }
        .info-item span { font-weight: 600; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">✈️</div>
        <h1>C919系统CBT培训平台</h1>
        <p class="subtitle">Aviation Maintenance Training System</p>
        
        <div class="cards">
            <a href="student/index.html" class="card">
                <div class="card-icon">👨‍🎓</div>
                <div class="card-title">学员学习中心</div>
                <div class="card-desc">进入C919各系统培训课程<br>学习ATA21-ATA80全章节</div>
            </a>
            
            <a href="admin/login.html" class="card">
                <div class="card-icon">🔧</div>
                <div class="card-title">管理后台</div>
                <div class="card-desc">系统管理、课件上传<br>学员学习进度监控</div>
            </a>
        </div>
        
        <div class="info-bar">
            <div class="info-item">📚 <span>28</span> 个ATA系统模块</div>
            <div class="info-item">✈️ <span>C919</span> 大型客机</div>
            <div class="info-item">🔧 <span>CFM LEAP-1C</span> 发动机</div>
        </div>
        
        <div class="footer">
            演示账号：zhangwei / 123456 | admin / admin123
        </div>
    </div>
</body>
</html>
