<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 航空CBT培训平台</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .card-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        
        .trend-chart {
            height: 300px;
            background: var(--bg-white);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }
        
        .recent-activity {
            background: var(--bg-white);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }
        
        .activity-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }
        
        .activity-item:last-child {
            border-bottom: none;
        }
        
        .activity-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .activity-content {
            flex: 1;
        }
        
        .activity-text {
            font-size: 14px;
            color: var(--text-dark);
        }
        
        .activity-time {
            font-size: 12px;
            color: var(--text-gray);
            margin-top: 2px;
        }
        
        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>航空CBT培训</h2>
                <p>管理员后台</p>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    仪表盘
                </a>
                <a href="students.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    学员管理
                </a>
                <a href="courses.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                    课程管理
                </a>
                <a href="courseware.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="8" y1="13" x2="16" y2="13"/>
                        <line x1="8" y1="17" x2="16" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                    课件管理
                </a>
                <a href="assignments.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    课程分配
                </a>
                <a href="records.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                    学习记录
                </a>
                <a href="reports.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 3v18h18"/>
                        <path d="M18 17V9"/>
                        <path d="M13 17V5"/>
                        <path d="M8 17v-3"/>
                    </svg>
                    统计报表
                </a>
                <div class="nav-divider"></div>
                <a href="#" class="nav-item" onclick="LMS.logout(); return false;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    退出登录
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <h1>仪表盘</h1>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar">管</div>
                        <div>
                            <div class="user-name" id="userName">加载中...</div>
                            <div class="user-role">管理员</div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="page-content">
                <!-- 统计卡片 -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                <circle cx="9" cy="7" r="4"/>
                            </svg>
                        </div>
                        <div class="stat-value" id="totalStudents">0</div>
                        <div class="stat-label">总学员数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                            </svg>
                        </div>
                        <div class="stat-value" id="totalCourses">0</div>
                        <div class="stat-label">课程总数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon yellow">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                            </svg>
                        </div>
                        <div class="stat-value" id="totalCourseware">0</div>
                        <div class="stat-label">课件总数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon red">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <polyline points="12 6 12 12 16 14"/>
                            </svg>
                        </div>
                        <div class="stat-value" id="totalHours">0h</div>
                        <div class="stat-label">总学习时长</div>
                    </div>
                </div>

                <div class="card-grid">
                    <!-- 最近活动 -->
                    <div class="recent-activity">
                        <h3 style="margin-bottom: 20px; font-size: 16px; font-weight: 600;">最近学习活动</h3>
                        <div id="activityList">
                            <div class="loading">
                                <div class="spinner"></div>
                            </div>
                        </div>
                    </div>

                    <!-- 课程类型占比 -->
                    <div class="trend-chart">
                        <h3 style="margin-bottom: 20px; font-size: 16px; font-weight: 600;">课程类型分布</h3>
                        <div id="chartPlaceholder" style="height: 220px; display: flex; flex-direction: column; gap: 12px;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div style="width: 12px; height: 12px; background: var(--primary-blue); border-radius: 2px;"></div>
                                <div style="flex: 1;">CBT 系统培训</div>
                                <div style="font-weight: 600; width: 50px;" id="cbtCount">0</div>
                            </div>
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div style="width: 12px; height: 12px; background: var(--success-green); border-radius: 2px;"></div>
                                <div style="flex: 1;">ACPC 预备课程</div>
                                <div style="font-weight: 600; width: 50px;" id="acpcCount">0</div>
                            </div>
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div style="width: 12px; height: 12px; background: var(--accent-yellow); border-radius: 2px;"></div>
                                <div style="flex: 1;">PBN 性能导航</div>
                                <div style="font-weight: 600; width: 50px;" id="pbnCount">0</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../shared/app.js"></script>
    <script>
        const user = LMS.checkAuth(['admin', 'super_admin']);
        if (!user) {
            window.location.href = 'login.html';
        }

        document.getElementById('userName').textContent = user.name;
        document.getElementById('userAvatar').textContent = user.name.charAt(0);

        loadStats();
        loadActivity();

        function loadStats() {
            const students = LMS.getStudents();
            const courses = LMS.getCourses();
            const courseware = LMS.getCourseware();
            const records = LMS.getLearningRecords();

            const totalHours = records.reduce((sum, r) => sum + (r.duration || 0), 0);
            
            const cbtCount = courses.filter(c => c.category === 'CBT').length;
            const acpcCount = courses.filter(c => c.category === 'ACPC').length;
            const pbnCount = courses.filter(c => c.category === 'PBN').length;

            document.getElementById('totalStudents').textContent = students.length;
            document.getElementById('totalCourses').textContent = courses.length;
            document.getElementById('totalCourseware').textContent = courseware.length;
            document.getElementById('totalHours').textContent = Math.round(totalHours / 3600) + 'h';
            
            document.getElementById('cbtCount').textContent = cbtCount;
            document.getElementById('acpcCount').textContent = acpcCount;
            document.getElementById('pbnCount').textContent = pbnCount;
        }

        function loadActivity() {
            const records = LMS.getLearningRecords();
            const students = LMS.getStudents();
            const courses = LMS.getCourses();
            const container = document.getElementById('activityList');

            if (records.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>暂无学习活动记录</p>
                    </div>
                `;
                return;
            }

            records.sort((a, b) => new Date(b.startTime) - new Date(a.startTime));
            const recentRecords = records.slice(0, 10);

            let html = '';
            recentRecords.forEach(record => {
                const student = students.find(s => s.id === record.studentId);
                const course = courses.find(c => c.id === record.courseId);

                html += `
                    <div class="activity-item">
                        <div class="activity-icon">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                ${record.status === 'completed'
                                    ? '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'
                                    : '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'
                                }
                            </svg>
                        </div>
                        <div class="activity-content">
                            <div class="activity-text">
                                <strong>${student?.name || '未知学员'}</strong> ${record.status === 'completed' ? '完成了' : '开始学习'}
                                <strong>${course?.name || '未知课程'}</strong>
                            </div>
                            <div class="activity-time">${LMS.formatDateTime(record.startTime)}</div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }
    </script>
</body>
</html>
