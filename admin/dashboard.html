<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 航空培训在线学习平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    body { background: var(--bg-primary); }
    .page-container { display: flex; min-height: 100vh; }
    .sidebar { background: var(--bg-sidebar); }
    .sidebar-logo { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 12px; }
    .sidebar-logo svg { width: 36px; height: 36px; }
    .sidebar-logo span { color: white; font-weight: 600; font-size: 16px; }
    .main-header { background: white; border-bottom: 1px solid var(--border-color); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 14px; }
    .breadcrumb a { color: var(--primary-color); }
    .chart-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; margin-top: 24px; }
    @media (max-width: 1024px) {
      .chart-grid { grid-template-columns: 1fr; }
    }
    .chart-card { background: white; border-radius: var(--border-radius-lg); padding: 24px; box-shadow: var(--shadow-sm); }
    .chart-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
    .activity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  </style>
</head>
<body>
  <div class="page-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg width="36" height="36" viewBox="0 0 80 80" fill="none">
          <rect width="80" height="80" rx="16" fill="rgba(255,255,255,0.2)"/>
          <path d="M40 15L55 35H25L40 15Z" fill="white" opacity="0.9"/>
          <path d="M40 35V55M35 50H45" stroke="white" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <span>管理后台</span>
      </div>
      
      <nav class="sidebar-nav">
        <div class="sidebar-section">
          <div class="sidebar-title">概览</div>
          <a href="dashboard.html" class="sidebar-link active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
            </svg>
            <span>仪表盘</span>
          </a>
        </div>
        
        <div class="sidebar-section">
          <div class="sidebar-title">学员管理</div>
          <a href="students.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <span>学员管理</span>
          </a>
          <a href="assignments.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
              <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
            </svg>
            <span>课程分配</span>
          </a>
        </div>
        
        <div class="sidebar-section">
          <div class="sidebar-title">课程管理</div>
          <a href="courses.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            </svg>
            <span>课程管理</span>
          </a>
          <a href="courseware.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="23 7 16 12 23 17 23 7"/>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            </svg>
            <span>课件管理</span>
          </a>
        </div>
        
        <div class="sidebar-section">
          <div class="sidebar-title">数据统计</div>
          <a href="records.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="20" x2="18" y2="10"/>
              <line x1="12" y1="20" x2="12" y2="4"/>
              <line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
            <span>学习记录</span>
          </a>
          <a href="reports.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            <span>统计报表</span>
          </a>
        </div>
      </nav>
      
      <div style="padding:20px;margin-top:auto;border-top:1px solid rgba(255,255,255,0.1);">
        <a href="../student/login.html" class="sidebar-link" onclick="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span>退出登录</span>
        </a>
      </div>
    </aside>
    
    <!-- Main Content -->
    <div style="flex:1;margin-left:260px;">
      <!-- Header -->
      <header class="main-header">
        <div class="breadcrumb">
          <span>首页</span>
          <span>/</span>
          <span>仪表盘</span>
        </div>
        
        <div style="display:flex;align-items:center;gap:16px;">
          <span style="font-size:13px;color:var(--text-secondary);" id="currentTime"></span>
          <div class="dropdown">
            <div class="user-menu">
              <div class="user-avatar" style="background:var(--primary-color);">A</div>
              <div class="user-info">
                <div class="user-name">管理员</div>
                <div class="user-role">系统管理员</div>
              </div>
            </div>
            <div class="dropdown-menu">
              <a href="#" class="dropdown-item" onclick="logout()">退出登录</a>
            </div>
          </div>
        </div>
      </header>
      
      <!-- Content -->
      <div style="padding:24px;">
        <h2 style="margin-bottom:24px;">数据概览</h2>
        
        <!-- Stats Grid -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon blue">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            </div>
            <div class="stat-content">
              <div class="stat-value" id="totalStudents">0</div>
              <div class="stat-label">学员总数</div>
              <div class="stat-change up">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                </svg>
                本月新增 3 人
              </div>
            </div>
          </div>
          
          <div class="stat-card">
            <div class="stat-icon green">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
              </svg>
            </div>
            <div class="stat-content">
              <div class="stat-value" id="totalCourses">0</div>
              <div class="stat-label">课程总数</div>
              <div class="stat-change">
                <span class="badge badge-success" style="font-size:11px;">已发布 5</span>
              </div>
            </div>
          </div>
          
          <div class="stat-card">
            <div class="stat-icon orange">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
            </div>
            <div class="stat-content">
              <div class="stat-value" id="todayHours">0h</div>
              <div class="stat-label">今日学习时长</div>
              <div class="stat-change up">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                </svg>
                较昨日 +15%
              </div>
            </div>
          </div>
          
          <div class="stat-card">
            <div class="stat-icon red">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
            </div>
            <div class="stat-content">
              <div class="stat-value" id="completionRate">0%</div>
              <div class="stat-label">课程完成率</div>
              <div class="stat-change">
                <span id="completedCount">0</span> 人已完成
              </div>
            </div>
          </div>
        </div>
        
        <!-- Charts -->
        <div class="chart-grid">
          <div class="chart-card">
            <div class="chart-title">📈 近30天学习趋势</div>
            <div class="chart-container" id="trendChart">
              <div style="height:250px;display:flex;align-items:flex-end;justify-content:space-around;gap:8px;padding:20px;">
                <!-- 模拟柱状图 -->
              </div>
            </div>
          </div>
          
          <div class="chart-card">
            <div class="chart-title">📊 课程完成情况</div>
            <div id="courseChart" style="height:250px;display:flex;flex-direction:column;gap:12px;padding:20px;">
              <!-- 动态加载 -->
            </div>
          </div>
        </div>
        
        <!-- Recent Activity -->
        <div class="card" style="margin-top:24px;">
          <div class="card-header">
            <h3 class="card-title">📝 最新学习记录</h3>
            <a href="records.html" style="color:var(--primary-color);font-size:13px;">查看全部 →</a>
          </div>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>学员</th>
                  <th>课程</th>
                  <th>学习时长</th>
                  <th>进度</th>
                  <th>时间</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody id="recentRecords">
                <!-- 动态加载 -->
              </tbody>
            </table>
          </div>
        </div>
        
        <!-- Quick Actions -->
        <div class="card" style="margin-top:24px;">
          <div class="card-header">
            <h3 class="card-title">⚡ 快捷操作</h3>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:16px;">
            <a href="students.html" class="btn btn-secondary" style="justify-content:flex-start;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="8.5" cy="7" r="4"/>
                <line x1="20" y1="8" x2="20" y2="14"/>
                <line x1="23" y1="11" x2="17" y2="11"/>
              </svg>
              添加学员
            </a>
            <a href="courses.html" class="btn btn-secondary" style="justify-content:flex-start;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                <line x1="12" y1="11" x2="12" y2="17"/>
                <line x1="9" y1="14" x2="15" y2="14"/>
              </svg>
              创建课程
            </a>
            <a href="courseware.html" class="btn btn-secondary" style="justify-content:flex-start;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              上传课件
            </a>
            <a href="reports.html" class="btn btn-secondary" style="justify-content:flex-start;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
              </svg>
              导出报表
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../shared/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      LMS.initializeMockData();
      const user = LMS.Auth.init();
      
      if (!user || user.role !== 'admin') {
        window.location.href = 'login.html';
        return;
      }
      
      // 更新时间
      updateTime();
      setInterval(updateTime, 1000);
      
      // 加载统计数据
      loadStats();
      
      // 加载图表
      loadTrendChart();
      loadCourseChart();
      
      // 加载最新记录
      loadRecentRecords();
    });
    
    function updateTime() {
      const now = new Date();
      const options = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' };
      document.getElementById('currentTime').textContent = now.toLocaleString('zh-CN', options);
    }
    
    function loadStats() {
      const stats = LMS.LearningTracker.getStatistics();
      
      document.getElementById('totalStudents').textContent = stats.totalUsers;
      document.getElementById('totalCourses').textContent = stats.totalCourses;
      
      const todayHours = Math.round(stats.todayDuration / 3600 * 10) / 10;
      document.getElementById('todayHours').textContent = todayHours + 'h';
      
      const completionRate = stats.totalRecords > 0 
        ? Math.round(stats.completedCount / stats.totalRecords * 100) 
        : 0;
      document.getElementById('completionRate').textContent = completionRate + '%';
      document.getElementById('completedCount').textContent = stats.completedCount;
    }
    
    function loadTrendChart() {
      const container = document.querySelector('#trendChart .chart-container');
      const days = 30;
      const maxHours = 10;
      
      let bars = '';
      for (let i = 0; i < days; i++) {
        const height = Math.random() * maxHours + 2;
        bars += `
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;">
            <div style="width:100%;height:${height * 20}px;background:linear-gradient(to top, var(--primary-color), var(--primary-light));border-radius:4px 4px 0 0;opacity:${0.4 + (i / days) * 0.6};"></div>
            <span style="font-size:10px;color:var(--text-secondary);">${i === 0 || i === 14 || i === 29 ? (30 - i) + '日' : ''}</span>
          </div>
        `;
      }
      
      container.innerHTML = `
        <div style="display:flex;align-items:flex-end;height:200px;padding:20px;gap:4px;">
          ${bars}
        </div>
        <div style="text-align:center;font-size:12px;color:var(--text-secondary);margin-top:12px;">
          <span style="display:inline-block;width:12px;height:12px;background:var(--primary-color);border-radius:2px;margin-right:4px;vertical-align:middle;"></span>
          日学习时长（小时）
        </div>
      `;
    }
    
    function loadCourseChart() {
      const container = document.getElementById('courseChart');
      const courses = LMS.CourseManager.getAll().slice(0, 5);
      const records = LMS.LearningTracker.getAllRecords();
      
      container.innerHTML = courses.map(course => {
        const courseRecords = records.filter(r => r.courseId === course.id);
        const completedCount = courseRecords.filter(r => r.status === 'completed').length;
        const totalCount = courseRecords.length || 1;
        const rate = Math.round(completedCount / totalCount * 100);
        
        return `
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:80px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${course.name.split(' - ')[0]}</div>
            <div style="flex:1;height:20px;background:var(--bg-primary);border-radius:10px;overflow:hidden;">
              <div style="width:${rate}%;height:100%;background:${rate >= 80 ? 'var(--success-color)' : rate >= 50 ? 'var(--primary-color)' : 'var(--warning-color)'};border-radius:10px;"></div>
            </div>
            <div style="width:45px;text-align:right;font-size:13px;color:var(--text-secondary);">${rate}%</div>
          </div>
        `;
      }).join('');
    }
    
    function loadRecentRecords() {
      const tbody = document.getElementById('recentRecords');
      const records = LMS.LearningTracker.getAllRecords()
        .sort((a, b) => new Date(b.startTime) - new Date(a.startTime))
        .slice(0, 10);
      
      const users = LMS.Storage.get('users') || [];
      const courses = LMS.CourseManager.getAll();
      
      if (records.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-secondary);padding:32px;">暂无学习记录</td></tr>';
        return;
      }
      
      tbody.innerHTML = records.map(record => {
        const user = users.find(u => u.id === record.userId);
        const course = courses.find(c => c.id === record.courseId);
        const statusClass = record.status === 'completed' ? 'badge-success' : 'badge-warning';
        const statusText = record.status === 'completed' ? '已完成' : '进行中';
        
        return `
          <tr>
            <td>${user?.name || '未知'}</td>
            <td>${course?.name || '未知课程'}</td>
            <td>${LMS.DataExporter.formatDuration(record.duration)}</td>
            <td>
              <div style="display:flex;align-items:center;gap:8px;">
                <div class="progress" style="width:60px;height:6px;">
                  <div class="progress-bar" style="width:${record.progress}%"></div>
                </div>
                <span style="font-size:12px;">${record.progress}%</span>
              </div>
            </td>
            <td>${LMS.UI.formatDate(record.startTime, 'short')}</td>
            <td><span class="badge ${statusClass}">${statusText}</span></td>
          </tr>
        `;
      }).join('');
    }
    
    function logout() {
      LMS.Auth.logout();
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
