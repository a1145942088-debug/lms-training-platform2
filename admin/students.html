<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学员管理 - 航空培训在线学习平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
  <div class="page-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg width="36" height="36" viewBox="0 0 80 80" fill="none">
          <rect width="80" height="80" rx="16" fill="rgba(255,255,255,0.2)"/>
          <path d="M40 15L55 35H25L40 15Z" fill="white" opacity="0.9"/>
          <path d="M40 35V55M35 50H45" stroke="white" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <span>管理后台</span>
      </div>
      
      <nav class="sidebar-nav">
        <div class="sidebar-section">
          <div class="sidebar-title">概览</div>
          <a href="dashboard.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <span>仪表盘</span>
          </a>
        </div>
        
        <div class="sidebar-section">
          <div class="sidebar-title">学员管理</div>
          <a href="students.html" class="sidebar-link active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>学员管理</span>
          </a>
          <a href="assignments.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
            <span>课程分配</span>
          </a>
        </div>
        
        <div class="sidebar-section">
          <div class="sidebar-title">课程管理</div>
          <a href="courses.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <span>课程管理</span>
          </a>
          <a href="courseware.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            <span>课件管理</span>
          </a>
        </div>
        
        <div class="sidebar-section">
          <div class="sidebar-title">数据统计</div>
          <a href="records.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <span>学习记录</span>
          </a>
          <a href="reports.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span>统计报表</span>
          </a>
        </div>
      </nav>
      
      <div style="padding:20px;margin-top:auto;border-top:1px solid rgba(255,255,255,0.1);">
        <a href="../student/login.html" class="sidebar-link" onclick="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>退出登录</span>
        </a>
      </div>
    </aside>
    
    <!-- Main Content -->
    <div style="flex:1;margin-left:260px;">
      <header class="main-header">
        <div class="breadcrumb">
          <a href="dashboard.html">首页</a>
          <span>/</span>
          <span>学员管理</span>
        </div>
        <div class="header-actions" style="display:flex;gap:12px;">
          <button class="btn btn-secondary" onclick="exportStudents()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            导出
          </button>
          <button class="btn btn-primary" onclick="openAddModal()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            添加学员
          </button>
        </div>
      </header>
      
      <div style="padding:24px;">
        <!-- Filter -->
        <div class="card">
          <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="搜索学员姓名、邮箱...">
            <select id="departmentFilter">
              <option value="">全部部门</option>
              <option value="机务维修部">机务维修部</option>
              <option value="质量管理部">质量管理部</option>
              <option value="安全管理部">安全管理部</option>
            </select>
            <select id="statusFilter">
              <option value="">全部状态</option>
              <option value="active">活跃</option>
              <option value="inactive">未登录</option>
            </select>
            <button class="btn btn-secondary" onclick="loadStudents()">筛选</button>
            <button class="btn btn-secondary" onclick="clearFilters()">清除</button>
          </div>
        </div>
        
        <!-- Table -->
        <div class="card" style="margin-top:24px;">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
                  <th>姓名</th>
                  <th>邮箱</th>
                  <th>部门</th>
                  <th>注册时间</th>
                  <th>最后登录</th>
                  <th>学习进度</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="studentsTable">
                <tr><td colspan="8" style="text-align:center;padding:32px;"><div class="loading"><div class="spinner"></div></div></td></tr>
              </tbody>
            </table>
          </div>
          
          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="studentModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">添加学员</h3>
        <button class="modal-close" onclick="closeModal('studentModal')">×</button>
      </div>
      <div class="modal-body">
        <form id="studentForm">
          <input type="hidden" id="studentId">
          <div class="form-row">
            <div class="form-group">
              <label>姓名 *</label>
              <input type="text" id="studentName" required>
            </div>
            <div class="form-group">
              <label>邮箱 *</label>
              <input type="email" id="studentEmail" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>部门</label>
              <select id="studentDepartment">
                <option value="">请选择部门</option>
                <option value="机务维修部">机务维修部</option>
                <option value="质量管理部">质量管理部</option>
                <option value="安全管理部">安全管理部</option>
                <option value="技术研发部">技术研发部</option>
              </select>
            </div>
            <div class="form-group">
              <label>手机号</label>
              <input type="tel" id="studentPhone">
            </div>
          </div>
          <div class="form-group" id="passwordGroup">
            <label>初始密码</label>
            <input type="password" id="studentPassword" placeholder="留空则使用默认密码 123456">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('studentModal')">取消</button>
        <button class="btn btn-primary" onclick="saveStudent()">保存</button>
      </div>
    </div>
  </div>

  <script src="../shared/app.js"></script>
  <script>
    let currentPage = 1;
    const perPage = 10;
    let allStudents = [];
    let selectedIds = [];
    
    document.addEventListener('DOMContentLoaded', function() {
      LMS.initializeMockData();
      const user = LMS.Auth.init();
      if (!user || user.role !== 'admin') {
        window.location.href = 'login.html';
        return;
      }
      
      loadStudents();
      
      document.getElementById('searchInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') loadStudents();
      });
    });
    
    function loadStudents() {
      const tbody = document.getElementById('studentsTable');
      const search = document.getElementById('searchInput').value.toLowerCase();
      const department = document.getElementById('departmentFilter').value;
      
      allStudents = LMS.StudentManager.getAll();
      
      // 筛选
      let filtered = allStudents;
      if (search) {
        filtered = filtered.filter(s => 
          s.name.toLowerCase().includes(search) || 
          s.email.toLowerCase().includes(search)
        );
      }
      if (department) {
        filtered = filtered.filter(s => s.department === department);
      }
      
      // 分页
      const total = filtered.length;
      const totalPages = Math.ceil(total / perPage);
      const start = (currentPage - 1) * perPage;
      const students = filtered.slice(start, start + perPage);
      
      if (students.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-secondary);padding:32px;">暂无学员数据</td></tr>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }
      
      const records = LMS.LearningTracker.getAllRecords();
      
      tbody.innerHTML = students.map(s => {
        const studentRecords = records.filter(r => r.userId === s.id);
        const maxProgress = studentRecords.length > 0 
          ? Math.max(...studentRecords.map(r => r.progress || 0))
          : 0;
        const lastLogin = s.lastLogin ? LMS.UI.formatDate(s.lastLogin, 'short') : '从未登录';
        
        return `
          <tr>
            <td><input type="checkbox" class="row-checkbox" value="${s.id}" onchange="updateSelected()"></td>
            <td><strong>${s.name}</strong></td>
            <td>${s.email}</td>
            <td>${s.department || '-'}</td>
            <td>${LMS.UI.formatDate(s.createdAt, 'date')}</td>
            <td>${lastLogin}</td>
            <td>
              <div style="display:flex;align-items:center;gap:8px;">
                <div class="progress" style="width:60px;height:6px;">
                  <div class="progress-bar ${maxProgress >= 100 ? 'success' : ''}" style="width:${maxProgress}%"></div>
                </div>
                <span style="font-size:12px;">${maxProgress}%</span>
              </div>
            </td>
            <td>
              <div class="table-actions">
                <button class="action-btn view" onclick="viewStudent('${s.id}')">详情</button>
                <button class="action-btn edit" onclick="editStudent('${s.id}')">编辑</button>
                <button class="action-btn" onclick="resetPassword('${s.id}')">重置密码</button>
                <button class="action-btn delete" onclick="deleteStudent('${s.id}')">删除</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
      
      renderPagination(totalPages);
    }
    
    function renderPagination(totalPages) {
      const container = document.getElementById('pagination');
      if (totalPages <= 1) { container.innerHTML = ''; return; }
      
      let html = `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">上一页</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
          html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
        }
      }
      html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">下一页</button>`;
      container.innerHTML = html;
    }
    
    function goToPage(page) {
      currentPage = page;
      loadStudents();
    }
    
    function clearFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('departmentFilter').value = '';
      document.getElementById('statusFilter').value = '';
      currentPage = 1;
      loadStudents();
    }
    
    function openAddModal() {
      document.getElementById('modalTitle').textContent = '添加学员';
      document.getElementById('studentForm').reset();
      document.getElementById('studentId').value = '';
      document.getElementById('passwordGroup').style.display = 'block';
      LMS.UI.openModal('studentModal');
    }
    
    function editStudent(id) {
      const student = LMS.StudentManager.getById(id);
      if (!student) return;
      
      document.getElementById('modalTitle').textContent = '编辑学员';
      document.getElementById('studentId').value = student.id;
      document.getElementById('studentName').value = student.name;
      document.getElementById('studentEmail').value = student.email;
      document.getElementById('studentDepartment').value = student.department || '';
      document.getElementById('studentPhone').value = student.phone || '';
      document.getElementById('studentPassword').value = '';
      document.getElementById('passwordGroup').style.display = 'none';
      LMS.UI.openModal('studentModal');
    }
    
    function saveStudent() {
      const id = document.getElementById('studentId').value;
      const data = {
        name: document.getElementById('studentName').value.trim(),
        email: document.getElementById('studentEmail').value.trim(),
        department: document.getElementById('studentDepartment').value,
        phone: document.getElementById('studentPhone').value.trim()
      };
      
      if (!data.name || !data.email) {
        LMS.UI.toast('请填写必填项', 'error');
        return;
      }
      
      if (id) {
        LMS.StudentManager.update(id, data);
        LMS.UI.toast('学员信息已更新', 'success');
      } else {
        data.password = document.getElementById('studentPassword').value || '123456';
        const result = LMS.StudentManager.create(data);
        if (result.success) {
          LMS.UI.toast('学员添加成功', 'success');
        } else {
          LMS.UI.toast(result.message, 'error');
          return;
        }
      }
      
      closeModal('studentModal');
      loadStudents();
    }
    
    function viewStudent(id) {
      const student = LMS.StudentManager.getById(id);
      const records = LMS.LearningTracker.getUserRecords(id);
      const assignments = LMS.AssignmentManager.getUserAssignments(id);
      
      alert(`学员详情\n\n姓名：${student.name}\n邮箱：${student.email}\n部门：${student.department || '未设置'}\n手机：${student.phone || '未设置'}\n注册时间：${LMS.UI.formatDate(student.createdAt)}\n最后登录：${student.lastLogin ? LMS.UI.formatDate(student.lastLogin) : '从未登录'}\n已分配课程：${assignments.length}门\n学习记录：${records.length}条`);
    }
    
    function resetPassword(id) {
      if (confirm('确定要重置该学员的密码吗？\n重置后密码将恢复为默认密码：123456')) {
        LMS.StudentManager.resetPassword(id);
        LMS.UI.toast('密码已重置为 123456', 'success');
      }
    }
    
    function deleteStudent(id) {
      const student = LMS.StudentManager.getById(id);
      if (confirm(`确定要删除学员 "${student.name}" 吗？\n此操作不可恢复。`)) {
        LMS.StudentManager.delete(id);
        LMS.UI.toast('学员已删除', 'success');
        loadStudents();
      }
    }
    
    function toggleSelectAll() {
      const checked = document.getElementById('selectAll').checked;
      document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = checked);
      updateSelected();
    }
    
    function updateSelected() {
      selectedIds = Array.from(document.querySelectorAll('.row-checkbox:checked')).map(cb => cb.value);
    }
    
    function exportStudents() {
      const csv = LMS.DataExporter.exportStudents();
      const filename = `学员列表_${LMS.UI.formatDate(new Date(), 'date')}.csv`;
      LMS.DataExporter.download(csv, filename);
      LMS.UI.toast('导出成功', 'success');
    }
    
    function logout() {
      LMS.Auth.logout();
      window.location.href = 'login.html';
    }
    
    function closeModal(id) {
      LMS.UI.closeModal(id);
    }
  </script>
</body>
</html>
