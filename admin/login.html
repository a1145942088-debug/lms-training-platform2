<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台登录 - C919系统CBT培训平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #0d3a5e 0%, #1a5fb4 50%, #3584e4 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    
    .login-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
      padding: 48px 40px;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .login-logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #0d3a5e, #1a5fb4);
      border-radius: 16px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    
    .login-header h1 {
      font-size: 24px;
      color: #0d3a5e;
      margin-bottom: 8px;
    }
    
    .login-header p {
      color: #718096;
      font-size: 14px;
    }
    
    .admin-badge {
      display: inline-block;
      background: #e74c3c;
      color: white;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #2d3748;
      font-size: 14px;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s ease;
      outline: none;
    }
    
    .form-group input:focus {
      border-color: #1a5fb4;
      box-shadow: 0 0 0 3px rgba(26, 95, 180, 0.1);
    }
    
    .form-group input::placeholder {
      color: #a0aec0;
    }
    
    .btn-login {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #1a5fb4, #0d3a5e);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(26, 95, 180, 0.35);
    }
    
    .btn-login:active {
      transform: translateY(0);
    }
    
    .demo-section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #e2e8f0;
    }
    
    .demo-title {
      font-size: 12px;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      text-align: center;
    }
    
    .demo-accounts {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .demo-btn {
      width: 100%;
      padding: 12px 16px;
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }
    
    .demo-btn:hover {
      background: #edf2f7;
      border-color: #1a5fb4;
    }
    
    .demo-btn .role {
      font-weight: 600;
      color: #2d3748;
    }
    
    .demo-btn .credentials {
      color: #718096;
      font-size: 13px;
    }
    
    .error-msg {
      background: #fed7d7;
      color: #c53030;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      text-align: center;
    }
    
    .error-msg.show {
      display: block;
    }
    
    .success-msg {
      background: #c6f6d5;
      color: #276749;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      text-align: center;
    }
    
    .success-msg.show {
      display: block;
    }
    
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: #718096;
      font-size: 14px;
      text-decoration: none;
    }
    
    .back-link:hover {
      color: #1a5fb4;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">✈️</div>
        <span class="admin-badge">ADMIN</span>
        <h1>管理后台</h1>
        <p>C919系统CBT培训平台</p>
      </div>
      
      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="username">管理员账号</label>
          <input type="text" id="username" placeholder="请输入管理员账号" required>
        </div>
        
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="请输入密码" required>
        </div>
        
        <button type="submit" class="btn-login">
          <span>🚀</span>
          登录管理后台
        </button>
      </form>
      
      <div class="demo-section">
        <div class="demo-title">快捷登录</div>
        <div class="demo-accounts">
          <button type="button" class="demo-btn" onclick="quickLogin('admin', 'admin123', '管理员')">
            <span class="role">👨‍💼 管理员</span>
            <span class="credentials">admin / admin123</span>
          </button>
          <button type="button" class="demo-btn" onclick="quickLogin('super', 'super123', '超级管理员')">
            <span class="role">👑 超级管理员</span>
            <span class="credentials">super / super123</span>
          </button>
        </div>
      </div>
      
      <a href="../index.html" class="back-link">← 返回首页</a>
    </div>
  </div>

  <script src="../shared/app.js"></script>
  <script>
    // 显示错误
    function showError(msg) {
      var errorDiv = document.getElementById('errorMsg');
      var successDiv = document.getElementById('successMsg');
      errorDiv.textContent = msg;
      errorDiv.classList.add('show');
      successDiv.classList.remove('show');
    }
    
    // 显示成功
    function showSuccess(msg) {
      var errorDiv = document.getElementById('errorMsg');
      var successDiv = document.getElementById('successMsg');
      successDiv.textContent = msg;
      successDiv.classList.add('show');
      errorDiv.classList.remove('show');
    }
    
    // 隐藏消息
    function hideMsgs() {
      document.getElementById('errorMsg').classList.remove('show');
      document.getElementById('successMsg').classList.remove('show');
    }
    
    // 快捷登录
    function quickLogin(username, password, roleName) {
      document.getElementById('username').value = username;
      document.getElementById('password').value = password;
      hideMsgs();
      doLogin();
    }
    
    // 执行登录
    function doLogin() {
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      
      if (!username || !password) {
        showError('请输入账号和密码');
        return;
      }
      
      // 调用登录
      var result = LMS.Auth.login(username, password);
      
      if (result.success) {
        if (result.user.role === 'admin' || result.user.role === 'super_admin') {
          showSuccess('登录成功，正在跳转...');
          setTimeout(function() {
            window.location.href = 'dashboard.html';
          }, 800);
        } else {
          showError('您没有管理后台访问权限');
        }
      } else {
        showError(result.message || '账号或密码错误');
      }
    }
    
    // 表单提交
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      hideMsgs();
      doLogin();
    });
  </script>
</body>
</html>
