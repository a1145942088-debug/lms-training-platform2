<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 航空CBT培训平台</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        .login-container {
            background: linear-gradient(135deg, #1a3a5c 0%, #2d4a6f 50%, #1a3a5c 100%);
        }
        
        .login-logo .logo-icon {
            background: var(--primary-blue);
        }
        
        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(245, 158, 11, 0.2);
            color: var(--accent-yellow);
            border-radius: 20px;
            font-size: 13px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <div class="admin-badge">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                    管理员入口
                </div>
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h1>航空CBT培训平台</h1>
                <p class="subtitle">管理后台</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="请输入管理员账号" required>
                </div>
                
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                    <div class="error-message" id="errorMsg">用户名或密码错误</div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                    登录管理后台
                </button>
                
                <a href="../index.html" class="btn btn-secondary btn-block" style="margin-top: 12px;">
                    返回学员登录
                </a>
            </form>
            
            <div class="demo-accounts" style="margin-top: 24px;">
                <h4>演示账号</h4>
                <div class="demo-account">
                    <span class="role">管理员</span>
                    <span class="cred">admin / admin123</span>
                </div>
                <div class="demo-account">
                    <span class="role">超级管理员</span>
                    <span class="cred">super / super123</span>
                </div>
            </div>
        </div>
    </div>

    <script src="../shared/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            errorMsg.classList.remove('show');
            
            setTimeout(() => {
                const result = LMS.login(username, password);
                
                if (result.success) {
                    if (result.user.role === 'student') {
                        errorMsg.textContent = '学员账号不能登录管理后台';
                        errorMsg.classList.add('show');
                        loginBtn.disabled = false;
                        loginBtn.textContent = '登录管理后台';
                        return;
                    }
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.textContent = result.message;
                    errorMsg.classList.add('show');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登录管理后台';
                }
            }, 500);
        });
    </script>
</body>
</html>
