<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台登录 - C919系统CBT培训平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    body { background: var(--bg-dark); }
    .admin-login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
    }
    .admin-login-card {
      background: var(--bg-secondary);
      border-radius: var(--border-radius-lg);
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      padding: 48px;
      width: 100%;
      max-width: 400px;
    }
    .admin-login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .admin-login-header h1 {
      font-size: 1.5rem;
      color: var(--primary-dark);
      margin-bottom: 4px;
    }
    .admin-login-header p {
      color: var(--text-secondary);
      font-size: 14px;
    }
    .admin-badge {
      display: inline-block;
      background: var(--danger-color);
      color: white;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .demo-accounts {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
    }
    .demo-accounts h4 {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .demo-btn {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .demo-btn:hover {
      background: var(--border-color);
    }
    .demo-btn span:first-child {
      font-weight: 500;
    }
    .demo-btn span:last-child {
      color: var(--text-secondary);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="admin-login-page">
    <div class="admin-login-card">
      <div class="admin-login-header">
        <div class="admin-badge">ADMIN</div>
        <h1>管理后台</h1>
        <p>C919系统CBT培训平台</p>
      </div>
      
      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="username">管理员账号</label>
          <input type="text" id="username" name="username" placeholder="请输入管理员账号" required>
        </div>
        
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" name="password" placeholder="请输入密码" required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:8px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          登录管理后台
        </button>
      </form>
      
      <div class="demo-accounts">
        <h4>演示账号</h4>
        <button type="button" class="demo-btn" id="adminBtn">
          <span>管理员</span>
          <span>admin / admin123</span>
        </button>
      </div>
    </div>
  </div>

  <script src="../shared/app.js"></script>
  <script>
    // 等待页面完全加载
    window.addEventListener('load', function() {
      // 初始化数据
      if (typeof initializeMockData === 'function') {
        initializeMockData();
      }
      
      // 检查是否已登录
      if (typeof LMS !== 'undefined' && LMS.Auth) {
        var currentUser = LMS.Auth.init();
        if (currentUser && currentUser.role === 'admin') {
          window.location.href = 'dashboard.html';
          return;
        }
      }
      
      // 演示账号按钮点击
      document.getElementById('adminBtn').addEventListener('click', function() {
        document.getElementById('username').value = 'admin';
        document.getElementById('password').value = 'admin123';
        // 自动提交
        document.getElementById('loginForm').dispatchEvent(new Event('submit'));
      });
      
      // 表单提交
      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;
        
        var result = LMS.Auth.login(username, password);
        
        if (result.success) {
          if (result.user.role === 'admin') {
            alert('登录成功，正在跳转...');
            setTimeout(function() {
              window.location.href = 'dashboard.html';
            }, 500);
          } else {
            alert('您没有管理后台访问权限');
          }
        } else {
          alert(result.message);
        }
      });
    });
  </script>
</body>
</html>
