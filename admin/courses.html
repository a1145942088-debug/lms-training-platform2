<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程管理 - 航空CBT培训平台</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        .course-card {
            position: relative;
        }
        
        .course-card .badge {
            position: absolute;
            top: 16px;
            right: 16px;
        }
        
        .course-header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, #2d4a6f 100%);
            color: white;
            padding: 16px;
        }
        
        .course-header h4 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .course-header .course-code {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .course-body {
            padding: 16px;
        }
        
        .course-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 16px;
            font-size: 13px;
        }
        
        .course-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-gray);
        }
        
        .course-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
        }
        
        .course-actions button {
            padding: 8px 12px;
            font-size: 12px;
        }
        
        .form-section {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .form-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .chapter-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-light);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .chapter-item input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }
        
        .chapter-item .delete-btn {
            background: var(--danger-red);
            color: white;
            border: none;
            border-radius: 6px;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>航空CBT培训</h2>
                <p>管理员后台</p>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    仪表盘
                </a>
                <a href="students.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    学员管理
                </a>
                <a href="courses.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                    课程管理
                </a>
                <a href="courseware.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="8" y1="13" x2="16" y2="13"/>
                        <line x1="8" y1="17" x2="16" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                    课件管理
                </a>
                <a href="assignments.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    课程分配
                </a>
                <a href="records.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                    学习记录
                </a>
                <a href="reports.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 3v18h18"/>
                        <path d="M18 17V9"/>
                        <path d="M13 17V5"/>
                        <path d="M8 17v-3"/>
                    </svg>
                    统计报表
                </a>
                <div class="nav-divider"></div>
                <a href="#" class="nav-item" onclick="LMS.logout(); return false;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    退出登录
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <h1>课程管理</h1>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar">管</div>
                        <div>
                            <div class="user-name" id="userName">加载中...</div>
                            <div class="user-role">管理员</div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="page-content">
                <div class="toolbar">
                    <div class="toolbar-left">
                        <div class="search-box">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="m21 21-4.35-4.35"/>
                            </svg>
                            <input type="text" id="searchInput" placeholder="搜索课程名称/编号/机型...">
                        </div>
                        <select id="categoryFilter">
                            <option value="">全部类型</option>
                            <option value="CBT">CBT 系统培训</option>
                            <option value="ACPC">ACPC 预备课程</option>
                            <option value="PBN">PBN 性能导航</option>
                        </select>
                    </div>
                    <div class="toolbar-right">
                        <button class="btn btn-primary" onclick="openAddModal()">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            创建课程
                        </button>
                    </div>
                </div>

                <div class="course-grid" id="courseList">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 添加/编辑课程模态框 -->
    <div class="modal-overlay" id="courseModal" style="max-height: 90vh; overflow-y: auto;">
        <div class="modal" style="max-width: 700px; max-height: 90vh;">
            <div class="modal-header">
                <h3 id="modalTitle">创建课程</h3>
                <button class="modal-close" onclick="closeModal()">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="courseForm">
                <div class="modal-body">
                    <div class="form-section">
                        <h4 style="margin-bottom: 16px; font-size: 16px;">基本信息</h4>
                        <div class="form-row">
                            <div class="form-group">
                                <label>课程编号 <span style="color: red;">*</span></label>
                                <input type="text" id="formCode" placeholder="例如：CBT-B737NG" required>
                            </div>
                            <div class="form-group">
                                <label>课程类型 <span style="color: red;">*</span></label>
                                <select id="formCategory" required>
                                    <option value="CBT">CBT 系统培训</option>
                                    <option value="ACPC">ACPC 预备课程</option>
                                    <option value="PBN">PBN 性能导航</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>课程名称 <span style="color: red;">*</span></label>
                                <input type="text" id="formName" placeholder="例如：波音737NG系统培训" required>
                            </div>
                            <div class="form-group">
                                <label>适用机型</label>
                                <input type="text" id="formAircraft" placeholder="例如：Boeing 737 NG">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>课程描述</label>
                            <textarea id="formDescription" rows="3" class="form-control" style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px;" placeholder="描述课程内容和学习目标..."></textarea>
                        </div>
                    </div>

                    <div class="form-section">
                        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
                            <h4 style="font-size: 16px;">课程章节</h4>
                            <button type="button" class="btn btn-secondary btn-sm" onclick="addChapter()">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="12" y1="5" x2="12" y2="19"/>
                                    <line x1="5" y1="12" x2="19" y2="12"/>
                                </svg>
                                添加章节
                            </button>
                        </div>
                        <div id="chaptersContainer">
                            <div class="chapter-item">
                                <input type="text" placeholder="章节编号" class="chapter-code" style="width: 80px;">
                                <input type="text" placeholder="章节名称" class="chapter-name">
                                <button type="button" class="delete-btn" onclick="removeChapter(this)">
                                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="3 6 5 6 21 6"/>
                                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存课程</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../shared/app.js"></script>
    <script>
        const user = LMS.checkAuth(['admin', 'super_admin']);
        if (!user) {
            window.location.href = 'login.html';
        }

        document.getElementById('userName').textContent = user.name;
        document.getElementById('userAvatar').textContent = user.name.charAt(0);

        let editingCourseId = null;

        loadCourses();
        document.getElementById('searchInput').addEventListener('input', loadCourses);
        document.getElementById('categoryFilter').addEventListener('change', loadCourses);

        function loadCourses() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const courses = LMS.getCourses();
            const container = document.getElementById('courseList');
            const assignments = LMS.getAssignments();
            const records = LMS.getLearningRecords();

            const filtered = courses.filter(c => 
                (!category || c.category === category) &&
                (c.name.toLowerCase().includes(search) ||
                 c.code.toLowerCase().includes(search) ||
                 (c.aircraft && c.aircraft.toLowerCase().includes(search)) ||
                 c.category.toLowerCase().includes(search))
            );

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                        </svg>
                        <h4>暂无课程数据</h4>
                        <p>点击右上角"创建课程"开始添加</p>
                    </div>
                `;
                return;
            }

            let html = '';
            filtered.forEach(course => {
                const courseAssignments = assignments.filter(a => a.courseId === course.id);
                const courseRecords = records.filter(r => r.courseId === course.id);
                const studentCount = new Set(courseAssignments.map(a => a.studentId)).size;

                html += `
                    <div class="course-card">
                        <span class="badge badge-primary">${course.category}</span>
                        <div class="course-header">
                            <h4>${course.name}</h4>
                            <div class="course-code">${course.code} · ${course.aircraft || '通用'}</div>
                        </div>
                        <div class="course-body">
                            <p style="font-size: 13px; color: var(--text-gray); margin-bottom: 16px; line-height: 1.5;">
                                ${course.description || '暂无描述'}
                            </p>
                            <div class="course-meta">
                                <div class="course-meta-item">
                                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                        <circle cx="9" cy="7" r="4"/>
                                    </svg>
                                    ${studentCount} 位学员
                                </div>
                                <div class="course-meta-item">
                                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                    </svg>
                                    ${course.chapters?.length || 0} 个章节
                                </div>
                                <div class="course-meta-item">
                                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="10"/>
                                        <polyline points="12 6 12 12 16 14"/>
                                    </svg>
                                    ${(course.chapters?.length || 0) * 30} 分钟
                                </div>
                                <div class="course-meta-item">
                                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                    </svg>
                                    ${courseRecords.length} 次学习
                                </div>
                            </div>
                            <div class="course-actions">
                                <button class="btn btn-secondary" onclick="editCourse('${course.id}')">编辑</button>
                                <button class="btn btn-danger" onclick="deleteCourse('${course.id}', '${course.name}')">删除</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function openAddModal() {
            editingCourseId = null;
            document.getElementById('modalTitle').textContent = '创建课程';
            document.getElementById('formCode').value = '';
            document.getElementById('formName').value = '';
            document.getElementById('formCategory').value = 'CBT';
            document.getElementById('formAircraft').value = '';
            document.getElementById('formDescription').value = '';
            document.getElementById('chaptersContainer').innerHTML = `
                <div class="chapter-item">
                    <input type="text" placeholder="章节编号" class="chapter-code" style="width: 80px;">
                    <input type="text" placeholder="章节名称" class="chapter-name">
                    <button type="button" class="delete-btn" onclick="removeChapter(this)">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                    </button>
                </div>
            `;
            document.getElementById('courseModal').classList.add('active');
        }

        function editCourse(id) {
            const courses = LMS.getCourses();
            const course = courses.find(c => c.id === id);
            if (!course) return;

            editingCourseId = id;
            document.getElementById('modalTitle').textContent = '编辑课程';
            document.getElementById('formCode').value = course.code;
            document.getElementById('formName').value = course.name;
            document.getElementById('formCategory').value = course.category;
            document.getElementById('formAircraft').value = course.aircraft || '';
            document.getElementById('formDescription').value = course.description || '';

            let chaptersHtml = '';
            if (course.chapters && course.chapters.length > 0) {
                course.chapters.forEach(ch => {
                    chaptersHtml += `
                        <div class="chapter-item">
                            <input type="text" placeholder="章节编号" class="chapter-code" style="width: 80px;" value="${ch.code}">
                            <input type="text" placeholder="章节名称" class="chapter-name" value="${ch.name}">
                            <button type="button" class="delete-btn" onclick="removeChapter(this)">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                </svg>
                            </button>
                        </div>
                    `;
                });
            } else {
                chaptersHtml = `
                    <div class="chapter-item">
                        <input type="text" placeholder="章节编号" class="chapter-code" style="width: 80px;">
                        <input type="text" placeholder="章节名称" class="chapter-name">
                        <button type="button" class="delete-btn" onclick="removeChapter(this)">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                            </svg>
                        </button>
                    </div>
                `;
            }
            document.getElementById('chaptersContainer').innerHTML = chaptersHtml;

            document.getElementById('courseModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('courseModal').classList.remove('active');
        }

        function addChapter() {
            const container = document.getElementById('chaptersContainer');
            const div = document.createElement('div');
            div.className = 'chapter-item';
            div.innerHTML = `
                <input type="text" placeholder="章节编号" class="chapter-code" style="width: 80px;">
                <input type="text" placeholder="章节名称" class="chapter-name">
                <button type="button" class="delete-btn" onclick="removeChapter(this)">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                </button>
            `;
            container.appendChild(div);
        }

        function removeChapter(btn) {
            const container = document.getElementById('chaptersContainer');
            if (container.children.length <= 1) {
                LMS.showToast('至少保留一个章节', 'error');
                return;
            }
            btn.parentElement.remove();
        }

        document.getElementById('courseForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            // 收集章节
            const chapterItems = document.querySelectorAll('.chapter-item');
            const chapters = [];
            let isValid = true;

            chapterItems.forEach((item, index) => {
                const code = item.querySelector('.chapter-code').value.trim();
                const name = item.querySelector('.chapter-name').value.trim();
                if (!code || !name) {
                    isValid = false;
                    return;
                }
                chapters.push({
                    id: `ch${index+1}`,
                    code,
                    name,
                    type: 'chapter'
                });
            });

            if (!isValid) {
                LMS.showToast('请填写完整的章节信息', 'error');
                return;
            }

            const data = {
                code: document.getElementById('formCode').value.trim(),
                name: document.getElementById('formName').value.trim(),
                category: document.getElementById('formCategory').value,
                aircraft: document.getElementById('formAircraft').value.trim(),
                description: document.getElementById('formDescription').value.trim(),
                chapters
            };

            if (editingCourseId) {
                LMS.updateCourse(editingCourseId, data);
                LMS.showToast('课程已更新', 'success');
            } else {
                LMS.addCourse(data);
                LMS.showToast('课程已创建', 'success');
            }

            closeModal();
            loadCourses();
        });

        function deleteCourse(id, name) {
            if (confirm(`确定要删除课程 "${name}" 吗？此操作将同时删除该课程的所有课件、分配和学习记录。`)) {
                LMS.deleteCourse(id);
                LMS.showToast('课程已删除', 'success');
                loadCourses();
            }
        }

        document.getElementById('courseModal').addEventListener('click', (e) => {
            if (e.target.id === 'courseModal') {
                closeModal();
            }
        });
    </script>
</body>
</html>
