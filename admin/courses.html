<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATA系统管理 - C919系统CBT培训平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .ata-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .ata-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transition: all 0.3s;
    }
    .ata-card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.12); transform: translateY(-2px); }
    .ata-header {
      padding: 20px;
      background: linear-gradient(135deg, #1565c0, #0d47a1);
      color: white;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .ata-code { font-size: 36px; font-weight: 800; }
    .ata-info h3 { font-size: 16px; margin-bottom: 4px; }
    .ata-info span { font-size: 12px; opacity: 0.8; }
    .ata-body { padding: 16px 20px; }
    .ata-stats { display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-bottom: 12px; }
    .ata-actions { display: flex; gap: 8px; padding: 16px 20px; border-top: 1px solid #eee; }
    
    /* 模态框 */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal { background: white; border-radius: 16px; width: 90%; max-width: 600px; max-height: 90vh; overflow: hidden; }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-size: 18px; font-weight: 600; }
    .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
    .modal-body { padding: 24px; max-height: 60vh; overflow-y: auto; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 12px; }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #333; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: #1565c0; box-shadow: 0 0 0 3px rgba(21,101,192,0.1);
    }
    
    .chapter-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; background: #f8fafc; border-radius: 8px; margin-bottom: 8px;
    }
    .chapter-item input { flex: 1; }
    .chapter-item .duration { width: 80px; }
    .chapter-item button { background: #f44336; color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }
    
    .btn-add-chapter {
      width: 100%; padding: 10px; border: 2px dashed #ddd; border-radius: 8px;
      background: none; color: #666; cursor: pointer; margin-top: 8px;
    }
    .btn-add-chapter:hover { border-color: #1565c0; color: #1565c0; }
    
    /* 文件上传区 */
    .upload-zone {
      border: 2px dashed #ddd; border-radius: 12px; padding: 40px; text-align: center;
      background: #fafafa; transition: all 0.3s; cursor: pointer;
    }
    .upload-zone:hover, .upload-zone.dragover { border-color: #1565c0; background: #e3f2fd; }
    .upload-zone input { display: none; }
    .upload-icon { font-size: 48px; margin-bottom: 16px; }
    .upload-text { color: #666; margin-bottom: 8px; }
    .upload-hint { font-size: 12px; color: #999; }
    
    .file-list { margin-top: 16px; }
    .file-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: #f5f5f5; border-radius: 8px; margin-bottom: 8px;
    }
    .file-item span { font-size: 13px; color: #333; }
    .file-item button { background: none; border: none; color: #999; cursor: pointer; font-size: 18px; }
    .file-item button:hover { color: #f44336; }
  </style>
</head>
<body>
  <div class="page-container">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg width="36" height="36" viewBox="0 0 80 80" fill="none">
          <rect width="80" height="80" rx="16" fill="rgba(255,255,255,0.2)"/>
          <path d="M40 15L55 35H25L40 15Z" fill="white"/>
          <path d="M25 35L40 55L55 35" stroke="white" stroke-width="3" fill="none"/>
        </svg>
        <span>管理后台</span>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section"><div class="sidebar-title">概览</div>
          <a href="dashboard.html" class="sidebar-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>仪表盘</span>
          </a>
        </div>
        <div class="sidebar-section"><div class="sidebar-title">学员管理</div>
          <a href="students.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>学员管理</span></a>
          <a href="assignments.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg><span>课程分配</span></a>
        </div>
        <div class="sidebar-section"><div class="sidebar-title">ATA系统管理</div>
          <a href="courses.html" class="sidebar-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span>ATA系统</span></a>
          <a href="courseware.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg><span>课件上传</span></a>
        </div>
        <div class="sidebar-section"><div class="sidebar-title">数据统计</div>
          <a href="records.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>学习记录</span></a>
          <a href="reports.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>统计报表</span></a>
        </div>
      </nav>
    </aside>
    
    <div style="flex:1;margin-left:260px;">
      <header class="main-header">
        <div class="breadcrumb">
          <a href="dashboard.html">首页</a>
          <span>/</span>
          <span>ATA系统管理</span>
        </div>
        <div style="display:flex;gap:12px;">
          <button class="btn btn-secondary" onclick="openUploadModal()">
            📁 批量导入课件
          </button>
          <button class="btn btn-primary" onclick="openAddModal()">
            ➕ 添加ATA系统
          </button>
        </div>
      </header>
      
      <div style="padding:24px;">
        <!-- 搜索筛选 -->
        <div style="background:white;padding:16px;border-radius:12px;margin-bottom:24px;display:flex;gap:16px;align-items:center;">
          <input type="text" id="searchInput" placeholder="搜索ATA系统..." style="flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:8px;">
          <select id="ataRange" style="padding:10px 14px;border:1px solid #ddd;border-radius:8px;">
            <option value="">全部ATA章节</option>
            <option value="20-29">ATA 20-29</option>
            <option value="30-39">ATA 30-39</option>
            <option value="70-79">ATA 70-79</option>
          </select>
        </div>
        
        <!-- 系统列表 -->
        <div class="ata-grid" id="ataList">
          <div style="grid-column:1/-1;text-align:center;padding:48px;"><div class="loading"><div class="spinner"></div></div></div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 添加/编辑系统模态框 -->
  <div class="modal-overlay" id="ataModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">添加ATA系统</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <form id="ataForm">
          <input type="hidden" id="ataId">
          <div class="form-group">
            <label>ATA章节代码 *</label>
            <input type="text" id="ataCode" required placeholder="例如：21、27、71" maxlength="2">
          </div>
          <div class="form-group">
            <label>系统名称 *</label>
            <input type="text" id="ataName" required placeholder="例如：空调与增压系统">
          </div>
          
          <div class="form-group">
            <label>章节内容</label>
            <div id="chapterList">
              <!-- 章节项动态添加 -->
            </div>
            <button type="button" class="btn-add-chapter" onclick="addChapterItem()">➕ 添加章节</button>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveATA()">保存</button>
      </div>
    </div>
  </div>
  
  <!-- 批量上传模态框 -->
  <div class="modal-overlay" id="uploadModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">批量导入ATA系统</h3>
        <button class="modal-close" onclick="closeUploadModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" multiple accept=".html,.zip,.pdf" onchange="handleFileSelect(event)">
          <div class="upload-icon">📂</div>
          <div class="upload-text">点击或拖拽文件到此处上传</div>
          <div class="upload-hint">支持 HTML、ZIP、PDF 格式。文件名会自动成为系统名称。</div>
        </div>
        <div class="file-list" id="fileList"></div>
        <div style="margin-top:20px;padding:16px;background:#f5f5f5;border-radius:8px;font-size:13px;color:#666;">
          <strong>说明：</strong><br>
          • 上传的文件名将自动作为ATA系统名称<br>
          • 系统ATA代码将从文件名中自动提取（如"ATA27飞控系统"→ ATA27）<br>
          • 支持同时上传多个文件批量创建系统
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeUploadModal()">取消</button>
        <button class="btn btn-primary" onclick="batchImport()">确认导入</button>
      </div>
    </div>
  </div>

  <script src="../shared/app.js"></script>
  <script>
    let chapterCount = 0;
    let uploadedFiles = [];
    
    document.addEventListener('DOMContentLoaded', function() {
      LMS.initializeMockData();
      const user = LMS.Auth.init();
      if (!user || user.role !== 'admin') { window.location.href = 'login.html'; return; }
      loadATA();
      
      // 绑定搜索事件
      document.getElementById('searchInput').addEventListener('input', debounce(loadATA, 300));
      document.getElementById('ataRange').addEventListener('change', loadATA);
      
      // 拖拽上传
      const uploadZone = document.getElementById('uploadZone');
      uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
      uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
      uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); handleFileDrop(e); });
    });
    
    function loadATA() {
      const container = document.getElementById('ataList');
      const search = document.getElementById('searchInput').value.toLowerCase();
      const range = document.getElementById('ataRange').value;
      
      let systems = LMS.ATAManager.getAll();
      
      // 筛选
      if (search) {
        systems = systems.filter(s => 
          s.name.toLowerCase().includes(search) || 
          s.ataCode.includes(search)
        );
      }
      
      if (range) {
        const [start, end] = range.split('-').map(Number);
        systems = systems.filter(s => {
          const code = parseInt(s.ataCode);
          return code >= start && code <= end;
        });
      }
      
      // 按ATA代码排序
      systems.sort((a, b) => parseInt(a.ataCode) - parseInt(b.ataCode));
      
      if (systems.length === 0) {
        container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:48px;color:#999;">暂无ATA系统数据</div>';
        return;
      }
      
      container.innerHTML = systems.map(s => `
        <div class="ata-card">
          <div class="ata-header">
            <div class="ata-code">${s.ataCode}</div>
            <div class="ata-info">
              <h3>${s.name}</h3>
              <span>${s.chapters?.length || 0} 章节</span>
            </div>
          </div>
          <div class="ata-body">
            <div class="ata-stats">
              <span>📚 ${s.chapters?.length || 0} 章节</span>
              <span>⏱️ ${s.duration || 0} 分钟</span>
              <span>👥 ${getStudentCount(s.id)} 人学习</span>
            </div>
          </div>
          <div class="ata-actions">
            <button class="btn btn-primary btn-sm" onclick="window.location.href='courseware.html?ataId=${s.id}'" style="flex:1;">管理课件</button>
            <button class="btn btn-secondary btn-sm" onclick="editATA('${s.id}')">编辑</button>
            <button class="btn btn-secondary btn-sm" onclick="deleteATA('${s.id}')">删除</button>
          </div>
        </div>
      `).join('');
    }
    
    function getStudentCount(ataId) {
      const records = LMS.LearningTracker.getAllRecords({ courseId: ataId });
      return new Set(records.map(r => r.userId)).size;
    }
    
    function openAddModal() {
      document.getElementById('modalTitle').textContent = '添加ATA系统';
      document.getElementById('ataForm').reset();
      document.getElementById('ataId').value = '';
      document.getElementById('chapterList').innerHTML = '';
      chapterCount = 0;
      addChapterItem(); // 添加一个默认章节
      document.getElementById('ataModal').classList.add('active');
    }
    
    function editATA(id) {
      const ata = LMS.ATAManager.getById(id);
      if (!ata) return;
      
      document.getElementById('modalTitle').textContent = '编辑ATA系统';
      document.getElementById('ataId').value = ata.id;
      document.getElementById('ataCode').value = ata.ataCode;
      document.getElementById('ataName').value = ata.name;
      document.getElementById('chapterList').innerHTML = '';
      chapterCount = 0;
      
      if (ata.chapters && ata.chapters.length > 0) {
        ata.chapters.forEach(ch => addChapterItem(ch.title, ch.duration));
      } else {
        addChapterItem();
      }
      
      document.getElementById('ataModal').classList.add('active');
    }
    
    function addChapterItem(title = '', duration = 30) {
      chapterCount++;
      const container = document.getElementById('chapterList');
      const div = document.createElement('div');
      div.className = 'chapter-item';
      div.innerHTML = `
        <span style="color:#666;font-size:13px;min-width:20px;">${chapterCount}.</span>
        <input type="text" class="title-input" placeholder="章节名称" value="${title}">
        <input type="number" class="duration duration-input" placeholder="时长(分钟)" value="${duration}" min="1">
        <button type="button" onclick="this.parentElement.remove()">×</button>
      `;
      container.appendChild(div);
    }
    
    function saveATA() {
      const id = document.getElementById('ataId').value;
      const ataCode = document.getElementById('ataCode').value.trim();
      const ataName = document.getElementById('ataName').value.trim();
      
      if (!ataCode || !ataName) {
        alert('请填写ATA代码和系统名称');
        return;
      }
      
      // 收集章节
      const chapters = [];
      document.querySelectorAll('.chapter-item').forEach(item => {
        const title = item.querySelector('.title-input').value.trim();
        const duration = parseInt(item.querySelector('.duration-input').value) || 30;
        if (title) {
          chapters.push({
            id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
            title,
            duration
          });
        }
      });
      
      const data = {
        ataCode: ataCode.padStart(2, '0'),
        name: ataName,
        chapters,
        duration: chapters.reduce((sum, c) => sum + c.duration, 0)
      };
      
      if (id) {
        LMS.ATAManager.update(id, data);
        alert('系统已更新');
      } else {
        LMS.ATAManager.create(data);
        alert('系统已添加');
      }
      
      closeModal();
      loadATA();
    }
    
    function deleteATA(id) {
      if (!confirm('确定要删除这个ATA系统吗？')) return;
      LMS.ATAManager.delete(id);
      loadATA();
    }
    
    function closeModal() {
      document.getElementById('ataModal').classList.remove('active');
    }
    
    // 批量上传
    function openUploadModal() {
      uploadedFiles = [];
      document.getElementById('fileList').innerHTML = '';
      document.getElementById('uploadModal').classList.add('active');
    }
    
    function closeUploadModal() {
      document.getElementById('uploadModal').classList.remove('active');
    }
    
    function handleFileSelect(event) {
      const files = Array.from(event.target.files);
      processFiles(files);
    }
    
    function handleFileDrop(event) {
      const files = Array.from(event.dataTransfer.files);
      processFiles(files);
    }
    
    function processFiles(files) {
      files.forEach(file => {
        if (!uploadedFiles.find(f => f.name === file.name)) {
          uploadedFiles.push(file);
        }
      });
      renderFileList();
    }
    
    function renderFileList() {
      const container = document.getElementById('fileList');
      container.innerHTML = uploadedFiles.map((file, index) => `
        <div class="file-item">
          <span>📄 ${file.name}</span>
          <button onclick="removeFile(${index})">×</button>
        </div>
      `).join('');
    }
    
    function removeFile(index) {
      uploadedFiles.splice(index, 1);
      renderFileList();
    }
    
    function batchImport() {
      if (uploadedFiles.length === 0) {
        alert('请先上传文件');
        return;
      }
      
      // 从文件名创建系统
      uploadedFiles.forEach(file => {
        const name = file.name.replace(/\.[^/.]+$/, ''); // 去除扩展名
        // 尝试提取ATA代码
        const match = name.match(/ATA\s*(\d{2})/i) || name.match(/^(\d{2})[\s\-]/);
        const ataCode = match ? match[1] : '';
        
        LMS.ATAManager.create({
          name: name,
          ataCode: ataCode,
          fileName: file.name,
          chapters: [{ id: Date.now().toString(), title: name, duration: 30 }]
        });
      });
      
      alert(`成功导入 ${uploadedFiles.length} 个ATA系统`);
      closeUploadModal();
      loadATA();
    }
    
    function debounce(func, wait) {
      let timeout;
      return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
      };
    }
  </script>
</body>
</html>
