<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课件管理 - 航空培训在线学习平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .upload-zone { border: 2px dashed var(--border-color); border-radius: var(--border-radius-lg); padding: 48px; text-align: center; transition: var(--transition); cursor: pointer; background: var(--bg-primary); }
    .upload-zone:hover, .upload-zone.dragover { border-color: var(--primary-color); background: var(--primary-bg); }
    .upload-zone-icon { width: 64px; height: 64px; margin: 0 auto 16px; color: var(--text-secondary); }
    .upload-progress { margin-top: 16px; display: none; }
    .upload-progress.active { display: block; }
    .file-info { display: flex; align-items: center; gap: 16px; padding: 16px; background: var(--bg-primary); border-radius: var(--border-radius); margin-top: 16px; }
    .file-icon { width: 48px; height: 48px; background: var(--primary-bg); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--primary-color); }
    .courseware-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .courseware-card { background: white; border-radius: var(--border-radius); padding: 20px; box-shadow: var(--shadow-sm); }
  </style>
</head>
<body>
  <div class="page-container">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg width="36" height="36" viewBox="0 0 80 80" fill="none"><rect width="80" height="80" rx="16" fill="rgba(255,255,255,0.2)"/><path d="M40 15L55 35H25L40 15Z" fill="white" opacity="0.9"/><path d="M40 35V55M35 50H45" stroke="white" stroke-width="3" stroke-linecap="round"/></svg>
        <span>管理后台</span>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section"><div class="sidebar-title">概览</div>
          <a href="dashboard.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>仪表盘</span></a>
        </div>
        <div class="sidebar-section"><div class="sidebar-title">学员管理</div>
          <a href="students.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>学员管理</span></a>
          <a href="assignments.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg><span>课程分配</span></a>
        </div>
        <div class="sidebar-section"><div class="sidebar-title">课程管理</div>
          <a href="courses.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span>课程管理</span></a>
          <a href="courseware.html" class="sidebar-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg><span>课件管理</span></a>
        </div>
        <div class="sidebar-section"><div class="sidebar-title">数据统计</div>
          <a href="records.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>学习记录</span></a>
          <a href="reports.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>统计报表</span></a>
        </div>
      </nav>
    </aside>
    
    <div style="flex:1;margin-left:260px;">
      <header class="main-header">
        <div class="breadcrumb">
          <a href="dashboard.html">首页</a><span>/</span><a href="courses.html">课程管理</a><span>/</span><span id="breadcrumbCourse">选择课程</span>
        </div>
        <button class="btn btn-primary" onclick="openUploadModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          上传课件
        </button>
      </header>
      
      <div style="padding:24px;">
        <!-- Course Selector -->
        <div class="card" style="margin-bottom:24px;">
          <div style="display:flex;align-items:center;gap:16px;">
            <label style="font-weight:500;">选择课程：</label>
            <select id="courseSelector" style="flex:1;padding:10px 14px;border:1px solid var(--border-color);border-radius:8px;" onchange="loadCoursewares()">
              <option value="">-- 请选择课程 --</option>
            </select>
          </div>
        </div>
        
        <!-- Upload Zone -->
        <div class="card" style="margin-bottom:24px;">
          <h4 style="margin-bottom:16px;">📤 快速上传</h4>
          <div class="upload-zone" id="uploadZone">
            <div class="upload-zone-icon">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </div>
            <h4>拖拽课件包到这里</h4>
            <p>或点击选择文件 · 支持 ZIP、HTML 格式</p>
            <p style="margin-top:8px;font-size:12px;color:var(--text-light);">Storyline 导出的 HTML5 课件包（包含 index.html 及相关资源）</p>
            <input type="file" id="fileInput" accept=".zip,.html" style="display:none;">
          </div>
          
          <div class="upload-progress" id="uploadProgress">
            <div class="progress" style="height:8px;">
              <div class="progress-bar" id="progressBar" style="width:0%"></div>
            </div>
            <p id="progressText" style="margin-top:8px;font-size:13px;color:var(--text-secondary);">上传中...</p>
          </div>
        </div>
        
        <!-- Courseware List -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">📚 已上传课件</h3>
          </div>
          <div class="courseware-grid" id="coursewareList">
            <div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--text-secondary);">请先选择课程</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Upload Modal -->
  <div class="modal-overlay" id="uploadModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">上传课件</h3>
        <button class="modal-close" onclick="closeModal('uploadModal')">×</button>
      </div>
      <div class="modal-body">
        <form id="coursewareForm">
          <div class="form-group">
            <label>所属课程 *</label>
            <select id="cwCourseId" required>
              <option value="">选择课程</option>
            </select>
          </div>
          <div class="form-group">
            <label>课件名称 *</label>
            <input type="text" id="cwName" required placeholder="例如：第一章 飞控系统概述">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>课件类型</label>
              <select id="cwType">
                <option value="html5">HTML5互动课件</option>
                <option value="video">视频课件</option>
                <option value="pdf">PDF文档</option>
              </select>
            </div>
            <div class="form-group">
              <label>预计时长（分钟）</label>
              <input type="number" id="cwDuration" value="60" min="1">
            </div>
          </div>
          <div class="form-group">
            <label>入口文件</label>
            <input type="text" id="cwEntryFile" value="index.html" placeholder="如 index.html, story.html">
            <small style="color:var(--text-light);">Storyline导出的HTML文件名称，默认为 index.html</small>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('uploadModal')">取消</button>
        <button class="btn btn-primary" onclick="createCourseware()">创建记录</button>
      </div>
    </div>
  </div>

  <!-- Preview Modal -->
  <div class="modal-overlay" id="previewModal" style="display:none;">
    <div class="modal" style="max-width:90%;height:90vh;display:flex;flex-direction:column;">
      <div class="modal-header">
        <h3 class="modal-title" id="previewTitle">课件预览</h3>
        <button class="modal-close" onclick="closePreview()">×</button>
      </div>
      <div class="modal-body" style="flex:1;padding:0;overflow:hidden;">
        <iframe id="previewIframe" style="width:100%;height:100%;border:none;" src=""></iframe>
        <div id="previewPlaceholder" style="display:none;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f5f5f5;">
          <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="1" style="margin-bottom:16px;">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          <p style="font-size:16px;color:#666;margin-bottom:8px;">[ 演示模式 ]</p>
          <p style="font-size:14px;color:#888;" id="previewPlaceholderText">课件将在此处预览显示</p>
        </div>
      </div>
    </div>
  </div>

  <script src="../shared/app.js"></script>
  <script>
    let selectedCourseId = '';
    let currentPreviewCourseware = null;
    
    document.addEventListener('DOMContentLoaded', function() {
      LMS.initializeMockData();
      const user = LMS.Auth.init();
      if (!user || user.role !== 'admin') { window.location.href = 'login.html'; return; }
      
      // 检查URL参数
      const urlParams = new URLSearchParams(window.location.search);
      const courseId = urlParams.get('courseId');
      
      loadCourses();
      
      if (courseId) {
        document.getElementById('courseSelector').value = courseId;
        loadCoursewares();
      }
      
      // 文件上传交互
      const uploadZone = document.getElementById('uploadZone');
      const fileInput = document.getElementById('fileInput');
      
      uploadZone.addEventListener('click', () => fileInput.click());
      uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
      uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
      uploadZone.addEventListener('drop', e => {
        e.preventDefault();
        uploadZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) handleFileUpload(e.dataTransfer.files[0]);
      });
      fileInput.addEventListener('change', e => { if (e.target.files.length) handleFileUpload(e.target.files[0]); });
    });
    
    function loadCourses() {
      const courses = LMS.CourseManager.getAll().filter(c => c.status === 'published');
      const options = courses.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      document.getElementById('courseSelector').innerHTML = '<option value="">-- 请选择课程 --</option>' + options;
      document.getElementById('cwCourseId').innerHTML = '<option value="">选择课程</option>' + options;
    }
    
    function loadCoursewares() {
      const container = document.getElementById('coursewareList');
      selectedCourseId = document.getElementById('courseSelector').value;
      
      const course = LMS.CourseManager.getById(selectedCourseId);
      document.getElementById('breadcrumbCourse').textContent = course?.name || '选择课程';
      
      if (!selectedCourseId) {
        container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--text-secondary);">请先选择课程</div>';
        return;
      }
      
      const coursewares = LMS.CoursewareManager.getByCourse(selectedCourseId);
      
      if (coursewares.length === 0) {
        container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--text-secondary);">该课程暂无课件<br><small style="margin-top:8px;">点击上方"上传课件"按钮添加</small></div>';
        return;
      }
      
      container.innerHTML = coursewares.map(cw => `
        <div class="courseware-card">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;">
            <div>
              <h4 style="margin-bottom:4px;">${cw.name}</h4>
              <span class="badge ${cw.status === 'published' ? 'badge-success' : 'badge-secondary'}">${cw.status === 'published' ? '已发布' : '草稿'}</span>
            </div>
            <span class="badge badge-primary">${(cw.type || 'html5').toUpperCase()}</span>
          </div>
          <div style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">
            <p>📁 文件：${cw.fileName || '未指定'}</p>
            <p>📝 入口：${cw.entryFile || 'index.html'}</p>
            <p>⏱️ 时长：约${cw.duration || 30}分钟</p>
            <p>📤 上传时间：${LMS.UI.formatDate(cw.uploadedAt || cw.createdAt)}</p>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-primary btn-sm" onclick="previewCourseware('${cw.id}')">预览</button>
            <button class="btn btn-secondary btn-sm" onclick="toggleCoursewareStatus('${cw.id}')">${cw.status === 'published' ? '下架' : '发布'}</button>
            <button class="btn btn-danger btn-sm" onclick="deleteCourseware('${cw.id}')">删除</button>
          </div>
        </div>
      `).join('');
    }
    
    function handleFileUpload(file) {
      const courseId = document.getElementById('courseSelector').value;
      if (!courseId) {
        LMS.UI.toast('请先选择所属课程', 'warning');
        return;
      }
      
      const progress = document.getElementById('uploadProgress');
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      
      progress.classList.add('active');
      progressText.textContent = `正在上传：${file.name}`;
      
      // 模拟上传进度
      let percent = 0;
      const interval = setInterval(() => {
        percent += Math.random() * 30;
        if (percent >= 100) {
          percent = 100;
          clearInterval(interval);
          progressText.textContent = '上传完成！';
          
          // 创建课件记录
          const course = LMS.CourseManager.getById(courseId);
          const fileName = file.name.replace(/\.(zip|html)$/i, '');
          
          LMS.CoursewareManager.upload({
            courseId,
            courseName: course.name,
            name: fileName,
            type: file.name.endsWith('.html') ? 'html5' : 'html5',
            entryFile: 'index.html',
            duration: 30,
            chapters: [{ id: 1, title: '默认章节', duration: 30 }]
          }, file);
          
          setTimeout(() => {
            progress.classList.remove('active');
            progressBar.style.width = '0%';
            LMS.UI.toast('课件上传成功', 'success');
            loadCoursewares();
          }, 500);
        }
        progressBar.style.width = percent + '%';
      }, 200);
    }
    
    function openUploadModal() {
      const courseId = document.getElementById('courseSelector').value;
      if (!courseId) {
        LMS.UI.toast('请先选择课程', 'warning');
        return;
      }
      document.getElementById('cwCourseId').value = courseId;
      LMS.UI.openModal('uploadModal');
    }
    
    function createCourseware() {
      const courseId = document.getElementById('cwCourseId').value;
      const name = document.getElementById('cwName').value.trim();
      
      if (!courseId || !name) {
        LMS.UI.toast('请填写必填项', 'error');
        return;
      }
      
      const course = LMS.CourseManager.getById(courseId);
      LMS.CoursewareManager.upload({
        courseId,
        courseName: course.name,
        name,
        type: document.getElementById('cwType').value,
        duration: parseInt(document.getElementById('cwDuration').value) || 60,
        entryFile: document.getElementById('cwEntryFile').value || 'index.html',
        chapters: [{ id: 1, title: '第一章', duration: 30 }]
      }, { name: name + '.zip', size: 0 });
      
      closeModal('uploadModal');
      loadCoursewares();
      LMS.UI.toast('课件创建成功', 'success');
    }
    
    function previewCourseware(id) {
      currentPreviewCourseware = LMS.CoursewareManager.getById(id);
      if (!currentPreviewCourseware) {
        showToast('课件不存在', 'error');
        return;
      }
      
      // 显示预览Modal
      document.getElementById('previewModal').style.display = 'flex';
      document.getElementById('previewTitle').textContent = '预览：' + currentPreviewCourseware.name;
      
      var iframe = document.getElementById('previewIframe');
      var placeholder = document.getElementById('previewPlaceholder');
      
      // 检查是否有课件URL
      if (currentPreviewCourseware.url) {
        iframe.src = currentPreviewCourseware.url;
        iframe.style.display = 'block';
        placeholder.style.display = 'none';
      } else {
        // 显示说明
        iframe.style.display = 'none';
        placeholder.style.display = 'flex';
        
        var entryFile = currentPreviewCourseware.entryFile || 'index.html';
        var fileName = currentPreviewCourseware.fileName || entryFile;
        
        placeholder.innerHTML = '<div style="text-align:center;max-width:500px;">' +
          '<div style="font-size:64px;margin-bottom:16px;">📖</div>' +
          '<h3 style="color:#333;margin-bottom:16px;">' + currentPreviewCourseware.name + '</h3>' +
          '<div style="background:#e3f2fd;padding:20px;border-radius:12px;text-align:left;margin-bottom:16px;">' +
            '<p style="color:#1565c0;margin-bottom:8px;"><strong>📁 课件信息</strong></p>' +
            '<p style="color:#666;font-size:14px;margin-bottom:4px;">• 文件名：' + fileName + '</p>' +
            '<p style="color:#666;font-size:14px;margin-bottom:4px;">• 入口文件：' + entryFile + '</p>' +
            '<p style="color:#666;font-size:14px;margin-bottom:4px;">• 预计时长：' + (currentPreviewCourseware.duration || 30) + ' 分钟</p>' +
            '<p style="color:#666;font-size:14px;">• 课件类型：' + ((currentPreviewCourseware.type === 'html5') ? 'HTML5互动课件' : currentPreviewCourseware.type) + '</p>' +
          '</div>' +
          '<div style="background:#fff3cd;padding:16px;border-radius:8px;text-align:left;">' +
            '<p style="color:#856404;font-size:13px;"><strong>⚠️ 预览说明</strong></p>' +
            '<p style="color:#856404;font-size:13px;margin-top:8px;">由于当前是纯前端演示模式，课件文件存储在本地浏览器中，无法直接在网页中嵌入预览。</p>' +
            '<p style="color:#856404;font-size:13px;margin-top:8px;">实际使用时，请通过以下方式预览：</p>' +
            '<p style="color:#856404;font-size:13px;margin-top:8px;">1. 部署到服务器后，在"课件上传"页面点击"预览"按钮</p>' +
            '<p style="color:#856404;font-size:13px;margin-top:4px;">2. 学员端进入课程学习页面后自动播放</p>' +
            '<p style="color:#856404;font-size:13px;margin-top:4px;">3. 下载ZIP包到本地，使用浏览器打开 index.html 预览</p>' +
          '</div>' +
        '</div>';
      }
    }
    
    function closePreview() {
      document.getElementById('previewModal').style.display = 'none';
      document.getElementById('previewIframe').src = '';
      currentPreviewCourseware = null;
    }
    
    function toggleCoursewareStatus(id) {
      const cw = LMS.CoursewareManager.getById(id);
      const newStatus = cw.status === 'published' ? 'draft' : 'published';
      LMS.CoursewareManager.update(id, { status: newStatus });
      loadCoursewares();
      LMS.UI.toast('状态已更新为：' + (newStatus === 'published' ? '已发布' : '草稿'), 'success');
    }
    
    function deleteCourseware(id) {
      if (confirm('确定要删除这个课件吗？')) {
        LMS.CoursewareManager.delete(id);
        loadCoursewares();
        LMS.UI.toast('课件已删除', 'success');
      }
    }
    
    function closeModal(id) { LMS.UI.closeModal(id); }
  </script>
</body>
</html>
