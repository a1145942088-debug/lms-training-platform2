<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>统计报表 - 航空培训在线学习平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
  <div class="page-container">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg width="36" height="36" viewBox="0 0 80 80" fill="none"><rect width="80" height="80" rx="16" fill="rgba(255,255,255,0.2)"/><path d="M40 15L55 35H25L40 15Z" fill="white" opacity="0.9"/><path d="M40 35V55M35 50H45" stroke="white" stroke-width="3" stroke-linecap="round"/></svg>
        <span>管理后台</span>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section"><div class="sidebar-title">概览</div>
          <a href="dashboard.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>仪表盘</span></a>
        </div>
        <div class="sidebar-section"><div class="sidebar-title">学员管理</div>
          <a href="students.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>学员管理</span></a>
          <a href="assignments.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg><span>课程分配</span></a>
        </div>
        <div class="sidebar-section"><div class="sidebar-title">课程管理</div>
          <a href="courses.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span>课程管理</span></a>
          <a href="courseware.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg><span>课件管理</span></a>
        </div>
        <div class="sidebar-section"><div class="sidebar-title">数据统计</div>
          <a href="records.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>学习记录</span></a>
          <a href="reports.html" class="sidebar-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>统计报表</span></a>
        </div>
      </nav>
    </aside>
    
    <div style="flex:1;margin-left:260px;">
      <header class="main-header">
        <div class="breadcrumb"><a href="dashboard.html">首页</a><span>/</span><span>统计报表</span></div>
        <div style="display:flex;gap:12px;">
          <button class="btn btn-secondary" onclick="exportReport()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            导出报表
          </button>
        </div>
      </header>
      
      <div style="padding:24px;">
        <!-- Report Type Selector -->
        <div class="card" style="margin-bottom:24px;">
          <div style="display:flex;gap:12px;flex-wrap:wrap;">
            <button class="btn btn-primary" id="tabStudent" onclick="switchTab('student')">按学员统计</button>
            <button class="btn btn-secondary" id="tabCourse" onclick="switchTab('course')">按课程统计</button>
            <button class="btn btn-secondary" id="tabDept" onclick="switchTab('dept')">按部门统计</button>
            <button class="btn btn-secondary" id="tabMonthly" onclick="switchTab('monthly')">月度趋势</button>
          </div>
        </div>
        
        <!-- Student Report -->
        <div id="reportStudent">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">👥 学员学习统计</h3>
            </div>
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>排名</th>
                    <th>学员</th>
                    <th>部门</th>
                    <th>学习时长</th>
                    <th>完成课程</th>
                    <th>平均进度</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="studentReportTable"></tbody>
              </table>
            </div>
          </div>
        </div>
        
        <!-- Course Report -->
        <div id="reportCourse" style="display:none;">
          <div class="stats-grid" style="margin-bottom:24px;">
            <div class="stat-card">
              <div class="stat-icon blue"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>
              <div class="stat-content">
                <div class="stat-value" id="courseTotal">0</div>
                <div class="stat-label">课程总数</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon green"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
              <div class="stat-content">
                <div class="stat-value" id="courseCompletion">0%</div>
                <div class="stat-label">平均完成率</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon orange"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
              <div class="stat-content">
                <div class="stat-value" id="courseEnrollment">0</div>
                <div class="stat-label">总学习人次</div>
              </div>
            </div>
          </div>
          
          <div class="card">
            <div class="card-header"><h3 class="card-title">📚 课程完成情况</h3></div>
            <div id="courseReportList" style="padding:20px;"></div>
          </div>
        </div>
        
        <!-- Department Report -->
        <div id="reportDept" style="display:none;">
          <div class="card">
            <div class="card-header"><h3 class="card-title">🏢 部门学习统计</h3></div>
            <div id="deptReportList" style="padding:20px;"></div>
          </div>
        </div>
        
        <!-- Monthly Trend -->
        <div id="reportMonthly" style="display:none;">
          <div class="card">
            <div class="card-header"><h3 class="card-title">📈 月度学习趋势</h3></div>
            <div id="monthlyChart" style="height:300px;display:flex;align-items:flex-end;justify-content:center;gap:16px;padding:40px;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../shared/app.js"></script>
  <script>
    let currentTab = 'student';
    
    document.addEventListener('DOMContentLoaded', function() {
      LMS.initializeMockData();
      const user = LMS.Auth.init();
      if (!user || user.role !== 'admin') { window.location.href = 'login.html'; return; }
      
      loadReport();
    });
    
    function switchTab(tab) {
      currentTab = tab;
      ['student', 'course', 'dept', 'monthly'].forEach(t => {
        document.getElementById(`report${t.charAt(0).toUpperCase() + t.slice(1)}`).style.display = t === tab ? 'block' : 'none';
        document.getElementById(`tab${t.charAt(0).toUpperCase() + t.slice(1)}`).className = t === tab ? 'btn btn-primary' : 'btn btn-secondary';
      });
      loadReport();
    }
    
    function loadReport() {
      switch (currentTab) {
        case 'student': loadStudentReport(); break;
        case 'course': loadCourseReport(); break;
        case 'dept': loadDeptReport(); break;
        case 'monthly': loadMonthlyReport(); break;
      }
    }
    
    function loadStudentReport() {
      const tbody = document.getElementById('studentReportTable');
      const students = LMS.StudentManager.getAll();
      const records = LMS.LearningTracker.getAllRecords();
      
      const studentStats = students.map(s => {
        const sRecords = records.filter(r => r.userId === s.id);
        return {
          student: s,
          totalDuration: sRecords.reduce((sum, r) => sum + (r.duration || 0), 0),
          completedCount: sRecords.filter(r => r.status === 'completed').length,
          avgProgress: sRecords.length > 0 
            ? Math.round(sRecords.reduce((sum, r) => sum + (r.progress || 0), 0) / sRecords.length)
            : 0
        };
      }).sort((a, b) => b.totalDuration - a.totalDuration);
      
      tbody.innerHTML = studentStats.map((stat, index) => `
        <tr>
          <td><strong>${index + 1}</strong></td>
          <td><strong>${stat.student.name}</strong></td>
          <td>${stat.student.department || '-'}</td>
          <td>${LMS.DataExporter.formatDuration(stat.totalDuration)}</td>
          <td>${stat.completedCount}门</td>
          <td>
            <div style="display:flex;align-items:center;gap:8px;">
              <div class="progress" style="width:60px;height:6px;">
                <div class="progress-bar ${stat.avgProgress >= 100 ? 'success' : ''}" style="width:${stat.avgProgress}%"></div>
              </div>
              <span style="font-size:12px;">${stat.avgProgress}%</span>
            </div>
          </td>
          <td>
            <button class="action-btn view" onclick="viewStudentDetail('${stat.student.id}')">详情</button>
          </td>
        </tr>
      `).join('');
    }
    
    function loadCourseReport() {
      const courses = LMS.CourseManager.getAll();
      const records = LMS.LearningTracker.getAllRecords();
      
      const totalCompletion = records.length > 0 
        ? Math.round(records.filter(r => r.status === 'completed').length / records.length * 100)
        : 0;
      
      document.getElementById('courseTotal').textContent = courses.length;
      document.getElementById('courseCompletion').textContent = totalCompletion + '%';
      document.getElementById('courseEnrollment').textContent = records.length;
      
      const container = document.getElementById('courseReportList');
      container.innerHTML = courses.map(c => {
        const cRecords = records.filter(r => r.courseId === c.id);
        const completed = cRecords.filter(r => r.status === 'completed').length;
        const rate = cRecords.length > 0 ? Math.round(completed / cRecords.length * 100) : 0;
        
        return `
          <div style="margin-bottom:20px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
              <span><strong>${c.name}</strong></span>
              <span>${completed}/${cRecords.length} 完成 (${rate}%)</span>
            </div>
            <div class="progress" style="height:12px;">
              <div class="progress-bar ${rate >= 80 ? 'success' : rate >= 50 ? '' : 'warning'}" style="width:${rate}%"></div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function loadDeptReport() {
      const container = document.getElementById('deptReportList');
      const students = LMS.StudentManager.getAll();
      const records = LMS.LearningTracker.getAllRecords();
      
      // 按部门分组
      const depts = {};
      students.forEach(s => {
        const dept = s.department || '未分配';
        if (!depts[dept]) depts[dept] = { students: [], records: [] };
        depts[dept].students.push(s);
        depts[dept].records.push(...records.filter(r => r.userId === s.id));
      });
      
      container.innerHTML = Object.entries(depts).map(([dept, data]) => {
        const totalDuration = data.records.reduce((sum, r) => sum + (r.duration || 0), 0);
        const completed = data.records.filter(r => r.status === 'completed').length;
        
        return `
          <div style="display:flex;align-items:center;gap:24px;padding:20px;background:var(--bg-primary);border-radius:8px;margin-bottom:12px;">
            <div style="flex:1;">
              <h4 style="margin-bottom:4px;">${dept}</h4>
              <p style="font-size:13px;color:var(--text-secondary);">${data.students.length}名学员 · ${data.records.length}条学习记录</p>
            </div>
            <div style="text-align:center;padding:0 24px;border-right:1px solid var(--border-color);">
              <div style="font-size:1.5rem;font-weight:700;color:var(--primary-color);">${Math.round(totalDuration/3600)}h</div>
              <div style="font-size:12px;color:var(--text-secondary);">累计学习</div>
            </div>
            <div style="text-align:center;">
              <div style="font-size:1.5rem;font-weight:700;color:var(--success-color);">${completed}</div>
              <div style="font-size:12px;color:var(--text-secondary);">已完成</div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function loadMonthlyReport() {
      const container = document.getElementById('monthlyChart');
      const records = LMS.LearningTracker.getAllRecords();
      const months = [];
      
      for (let i = 5; i >= 0; i--) {
        const d = new Date();
        d.setMonth(d.getMonth() - i);
        const monthKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        const monthLabel = `${d.getMonth() + 1}月`;
        const monthRecords = records.filter(r => r.startTime.startsWith(monthKey));
        const hours = monthRecords.reduce((sum, r) => sum + (r.duration || 0), 0) / 3600;
        months.push({ label: monthLabel, hours: Math.round(hours * 10) / 10 });
      }
      
      const maxHours = Math.max(...months.map(m => m.hours), 1);
      
      container.innerHTML = months.map(m => `
        <div style="flex:1;text-align:center;">
          <div style="margin-bottom:8px;font-size:12px;color:var(--text-secondary);">${m.hours}h</div>
          <div style="height:${200 * m.hours / maxHours + 20}px;background:linear-gradient(to top, var(--primary-color), var(--primary-light));border-radius:8px 8px 0 0;"></div>
          <div style="margin-top:8px;font-weight:500;">${m.label}</div>
        </div>
      `).join('');
    }
    
    function viewStudentDetail(id) {
      const student = LMS.StudentManager.getById(id);
      const records = LMS.LearningTracker.getUserRecords(id);
      
      alert(`学员详情：${student.name}\n\n邮箱：${student.email}\n部门：${student.department}\n学习记录：${records.length}条\n[查看完整详情]`);
    }
    
    function exportReport() {
      const csv = LMS.DataExporter.exportLearningRecords();
      const filename = `统计报表_${LMS.UI.formatDate(new Date(), 'date')}.csv`;
      LMS.DataExporter.download(csv, filename);
      LMS.UI.toast('报表导出成功', 'success');
    }
  </script>
</body>
</html>
