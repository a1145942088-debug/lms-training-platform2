<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学员学习中心 - C919系统CBT培训平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .header { background: linear-gradient(135deg, #0d47a1 0%, #1565c0 50%, #1976d2 100%); }
    .header-logo { color: var(--text-white); font-weight: 700; }
    .header-search input { background: rgba(255,255,255,0.1); border: none; color: white; }
    .header-search input::placeholder { color: rgba(255,255,255,0.6); }
    .user-menu { border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 16px; }
    
    /* ATA系统卡片 */
    .ata-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 24px; }
    .ata-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .ata-card:hover { transform: translateY(-6px); box-shadow: 0 12px 32px rgba(0,0,0,0.15); }
    .ata-card-header {
      padding: 20px;
      background: linear-gradient(135deg, #1565c0, #0d47a1);
      color: white;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .ata-code {
      font-size: 32px;
      font-weight: 800;
      opacity: 0.9;
      min-width: 70px;
    }
    .ata-info h3 { font-size: 16px; margin-bottom: 4px; }
    .ata-info span { font-size: 12px; opacity: 0.8; }
    .ata-card-body { padding: 16px 20px; }
    .ata-meta { display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-bottom: 12px; }
    .ata-progress-bar { height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; }
    .ata-progress-fill { height: 100%; background: linear-gradient(90deg, #1565c0, #42a5f5); border-radius: 3px; transition: width 0.3s; }
    .ata-card-footer { padding: 12px 20px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .ata-status { font-size: 12px; padding: 4px 10px; border-radius: 12px; }
    .ata-status.not-started { background: #fff3e0; color: #f57c00; }
    .ata-status.in-progress { background: #e3f2fd; color: #1976d2; }
    .ata-status.completed { background: #e8f5e9; color: #388e3c; }
    
    /* 返回按钮 */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      color: white;
      text-decoration: none;
      margin-bottom: 20px;
      transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.2); }
    
    .welcome-panel { background: linear-gradient(135deg, #1565c0, #0d47a1); color: white; padding: 32px; border-radius: 16px; margin-bottom: 24px; }
    .welcome-stats { display: flex; gap: 40px; margin-top: 24px; }
    .welcome-stat-value { font-size: 32px; font-weight: 700; }
    .welcome-stat-label { font-size: 13px; opacity: 0.8; }
    
    .course-detail-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 24px; }
    .chapter-list-item {
      display: flex;
      align-items: center;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f8fafc;
      transition: all 0.2s;
      cursor: pointer;
    }
    .chapter-list-item:hover { background: #e3f2fd; }
    .chapter-list-item.completed { background: #e8f5e9; }
    .chapter-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 16px; font-size: 14px; }
    .chapter-info { flex: 1; }
    .chapter-title { font-weight: 500; margin-bottom: 4px; }
    .chapter-duration { font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-logo">
      <svg width="40" height="40" viewBox="0 0 80 80" fill="none">
        <rect width="80" height="80" rx="16" fill="rgba(255,255,255,0.2)"/>
        <path d="M40 15L55 35H25L40 15Z" fill="white"/>
        <path d="M25 35L40 55L55 35" stroke="white" stroke-width="3" fill="none"/>
        <path d="M40 55V65" stroke="white" stroke-width="3"/>
      </svg>
      <span>C919系统CBT培训平台</span>
    </div>
    
    <div class="header-search">
      <input type="text" placeholder="搜索系统或课件..." id="searchInput">
    </div>
    
    <div class="header-actions">
      <div class="dropdown">
        <div class="user-menu">
          <div class="user-avatar" id="userAvatar">Z</div>
          <div class="user-info">
            <div class="user-name" id="userName">张三</div>
            <div class="user-role">学员</div>
          </div>
        </div>
        <div class="dropdown-menu">
          <a href="profile.html" class="dropdown-item">📋 我的档案</a>
          <a href="#" class="dropdown-item" onclick="logout()">🚪 退出登录</a>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <div class="main-content" style="padding:24px;">
    <!-- 返回按钮 -->
    <a href="index.html" class="back-btn" id="backBtn" style="display:none;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      返回系统列表
    </a>
    
    <!-- 欢迎面板 -->
    <div class="welcome-panel" id="welcomePanel">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <h2 id="welcomeTitle">下午好，张伟</h2>
          <p style="opacity:0.8;margin-top:4px;">C919大型客机系统CBT培训学习平台</p>
          <div class="welcome-stats">
            <div class="welcome-stat">
              <div class="welcome-stat-value" id="totalHours">0</div>
              <div class="welcome-stat-label">累计学习时长</div>
            </div>
            <div class="welcome-stat">
              <div class="welcome-stat-value" id="completedSystems">0</div>
              <div class="welcome-stat-label">已完成系统</div>
            </div>
            <div class="welcome-stat">
              <div class="welcome-stat-value" id="totalSystems">0</div>
              <div class="welcome-stat-label">总系统数</div>
            </div>
          </div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:64px;">✈️</div>
          <div style="opacity:0.8;">C919</div>
        </div>
      </div>
    </div>
    
    <!-- 系统列表（第一层） -->
    <div class="ata-grid" id="ataGrid">
      <!-- 动态加载ATA系统 -->
    </div>
    
    <!-- 章节列表（第二层） -->
    <div id="chapterView" style="display:none;">
      <div class="course-detail-card">
        <h3 style="margin-bottom:20px;" id="systemTitle">系统名称</h3>
        <div id="chapterList">
          <!-- 动态加载章节 -->
        </div>
      </div>
    </div>
  </div>

  <script src="../shared/app.js"></script>
  <script>
    // 页面初始化
    document.addEventListener('DOMContentLoaded', function() {
      LMS.initializeMockData();
      const user = LMS.Auth.init();
      
      if (!user || user.role !== 'student') {
        window.location.href = 'login.html';
        return;
      }
      
      // 更新用户信息
      document.getElementById('userName').textContent = user.name;
      document.getElementById('userAvatar').textContent = user.name.charAt(0);
      document.getElementById('welcomeTitle').textContent = getGreeting() + '，' + user.name;
      
      // 加载统计数据
      loadStats(user.id);
      
      // 检查是否有系统ID参数
      const urlParams = new URLSearchParams(window.location.search);
      const systemId = urlParams.get('systemId');
      
      if (systemId) {
        showSystemDetail(systemId);
      } else {
        showSystemList();
      }
      
      // 绑定搜索事件
      document.getElementById('searchInput').addEventListener('input', debounce(handleSearch, 300));
    });
    
    // 获取问候语
    function getGreeting() {
      const hour = new Date().getHours();
      if (hour < 12) return '早上好';
      if (hour < 18) return '下午好';
      return '晚上好';
    }
    
    // 加载统计数据
    function loadStats(userId) {
      const totalDuration = LMS.LearningTracker.getTotalDuration(userId);
      const hours = Math.floor(totalDuration / 3600);
      const minutes = Math.floor((totalDuration % 3600) / 60);
      document.getElementById('totalHours').textContent = hours > 0 ? `${hours}h${minutes}m` : `${minutes}m`;
      
      // 获取所有系统
      const systems = LMS.ATAManager.getAll();
      document.getElementById('totalSystems').textContent = systems.length;
      
      // 计算已完成系统数
      const records = LMS.LearningTracker.getUserRecords(userId);
      const completedSystems = new Set();
      records.filter(r => r.status === 'completed').forEach(r => {
        const system = systems.find(s => s.id === r.courseId);
        if (system) completedSystems.add(system.ataCode);
      });
      document.getElementById('completedSystems').textContent = completedSystems.size;
    }
    
    // 显示系统列表
    function showSystemList() {
      const grid = document.getElementById('ataGrid');
      const systems = LMS.ATAManager.getAll();
      const user = LMS.Auth.init();
      const records = LMS.LearningTracker.getUserRecords(user.id);
      
      // 计算每个系统的进度
      const systemProgress = {};
      systems.forEach(sys => {
        const sysRecords = records.filter(r => r.courseId === sys.id);
        const totalChapters = sys.chapters || 1;
        const completed = sysRecords.filter(r => r.status === 'completed').length;
        systemProgress[sys.id] = {
          progress: Math.round((completed / totalChapters) * 100),
          completed: completed,
          total: totalChapters,
          status: completed >= totalChapters ? 'completed' : (completed > 0 ? 'in-progress' : 'not-started')
        };
      });
      
      grid.innerHTML = systems.map(sys => {
        const prog = systemProgress[sys.id] || { progress: 0, status: 'not-started' };
        const statusText = prog.status === 'completed' ? '已完成' : (prog.status === 'in-progress' ? '进行中' : '未开始');
        const statusClass = prog.status === 'completed' ? 'completed' : (prog.status === 'in-progress' ? 'in-progress' : 'not-started');
        
        return `
          <div class="ata-card" onclick="showSystemDetail('${sys.id}')">
            <div class="ata-card-header">
              <div class="ata-code">${sys.ataCode}</div>
              <div class="ata-info">
                <h3>${sys.name}</h3>
                <span>${sys.chapters || 0} 章节</span>
              </div>
            </div>
            <div class="ata-card-body">
              <div class="ata-meta">
                <span>📚 ${sys.chapters || 0} 章节</span>
                <span>⏱️ ${sys.duration || 0} 分钟</span>
              </div>
              <div class="ata-progress-bar">
                <div class="ata-progress-fill" style="width: ${prog.progress}%"></div>
              </div>
              <div style="text-align:right;font-size:12px;color:#666;margin-top:4px;">${prog.progress}% 完成</div>
            </div>
            <div class="ata-card-footer">
              <span class="ata-status ${statusClass}">${statusText}</span>
              <span style="font-size:12px;color:#888;">👆 点击进入学习</span>
            </div>
          </div>
        `;
      }).join('');
    }
    
    // 显示系统详情
    function showSystemDetail(systemId) {
      const system = LMS.ATAManager.getById(systemId);
      if (!system) {
        alert('系统不存在');
        showSystemList();
        return;
      }
      
      document.getElementById('ataGrid').style.display = 'none';
      document.getElementById('chapterView').style.display = 'block';
      document.getElementById('backBtn').style.display = 'inline-flex';
      document.getElementById('welcomePanel').style.display = 'none';
      document.getElementById('systemTitle').textContent = `${system.ataCode} ${system.name}`;
      
      const user = LMS.Auth.init();
      const records = LMS.LearningTracker.getUserRecords(user.id).filter(r => r.courseId === systemId);
      const completedChapters = records.filter(r => r.status === 'completed').map(r => r.coursewareId);
      
      const container = document.getElementById('chapterList');
      if (!system.chapters || system.chapters.length === 0) {
        container.innerHTML = `
          <div style="text-align:center;padding:48px;color:#888;">
            <div style="font-size:48px;margin-bottom:16px;">📂</div>
            <p>暂无章节内容</p>
            <p style="font-size:13px;margin-top:8px;">请联系管理员上传课件</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = system.chapters.map((chapter, index) => {
        const isCompleted = completedChapters.includes(chapter.id);
        const bgColor = isCompleted ? '#e8f5e9' : '#f8fafc';
        const iconBg = isCompleted ? '#4caf50' : '#1565c0';
        const iconText = isCompleted ? '✓' : (index + 1);
        
        return `
          <div class="chapter-list-item ${isCompleted ? 'completed' : ''}" style="background:${bgColor};" onclick="startChapter('${systemId}', '${chapter.id}')">
            <div class="chapter-icon" style="background:${iconBg};color:white;font-weight:bold;">
              ${iconText}
            </div>
            <div class="chapter-info">
              <div class="chapter-title">${chapter.title}</div>
              <div class="chapter-duration">⏱️ ${chapter.duration || 30} 分钟</div>
            </div>
            <div style="font-size:13px;color:${isCompleted ? '#4caf50' : '#1565c0'};">
              ${isCompleted ? '已完成 ✓' : '开始学习 →'}
            </div>
          </div>
        `;
      }).join('');
    }
    
    // 开始章节学习
    function startChapter(systemId, chapterId) {
      window.location.href = `player.html?courseId=${systemId}&coursewareId=${chapterId}`;
    }
    
    // 返回系统列表
    function goBack() {
      document.getElementById('ataGrid').style.display = 'grid';
      document.getElementById('chapterView').style.display = 'none';
      document.getElementById('backBtn').style.display = 'none';
      document.getElementById('welcomePanel').style.display = 'block';
      history.replaceState(null, '', window.location.pathname);
    }
    
    // 搜索功能
    function handleSearch(keyword) {
      const grid = document.getElementById('ataGrid');
      const systems = LMS.ATAManager.getAll();
      const filtered = systems.filter(sys => 
        sys.name.toLowerCase().includes(keyword.toLowerCase()) ||
        sys.ataCode.toLowerCase().includes(keyword.toLowerCase())
      );
      
      if (filtered.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:48px;color:#888;">未找到匹配的系统</div>';
        return;
      }
      
      // 复用showSystemList的逻辑但用filtered数据
      const user = LMS.Auth.init();
      const records = LMS.LearningTracker.getUserRecords(user.id);
      
      grid.innerHTML = filtered.map(sys => {
        const sysRecords = records.filter(r => r.courseId === sys.id);
        const totalChapters = sys.chapters?.length || 1;
        const completed = sysRecords.filter(r => r.status === 'completed').length;
        const progress = Math.round((completed / totalChapters) * 100);
        const statusText = progress >= 100 ? '已完成' : (progress > 0 ? '进行中' : '未开始');
        const statusClass = progress >= 100 ? 'completed' : (progress > 0 ? 'in-progress' : 'not-started');
        
        return `
          <div class="ata-card" onclick="showSystemDetail('${sys.id}')">
            <div class="ata-card-header">
              <div class="ata-code">${sys.ataCode}</div>
              <div class="ata-info">
                <h3>${sys.name}</h3>
                <span>${sys.chapters?.length || 0} 章节</span>
              </div>
            </div>
            <div class="ata-card-body">
              <div class="ata-meta">
                <span>📚 ${sys.chapters?.length || 0} 章节</span>
                <span>⏱️ ${sys.duration || 0} 分钟</span>
              </div>
              <div class="ata-progress-bar">
                <div class="ata-progress-fill" style="width: ${progress}%"></div>
              </div>
              <div style="text-align:right;font-size:12px;color:#666;margin-top:4px;">${progress}% 完成</div>
            </div>
            <div class="ata-card-footer">
              <span class="ata-status ${statusClass}">${statusText}</span>
              <span style="font-size:12px;color:#888;">👆 点击进入学习</span>
            </div>
          </div>
        `;
      }).join('');
    }
    
    // 退出登录
    function logout() {
      LMS.Auth.logout();
      window.location.href = 'login.html';
    }
    
    // 防抖函数
    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }
  </script>
</body>
</html>
